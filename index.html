          <div style="display:flex;gap:8px;">
            <input id="styleWithInput" class="form-input" type="text" placeholder="or type anything… e.g. white sneakers"
              value="${esc(currentNeed)}"
              oninput="if(!S.styleWith)S.styleWith={entryId:'${entry.id}',need:'',loading:false,result:null};S.styleWith.need=this.value;"
              onkeydown="if(event.key==='Enter'&&this.value.trim())doStyleWith('${entry.id}',this.value.trim())"
              style="flex:1;font-size:14px;">
            <button onclick="const v=document.getElementById('styleWithInput')?.value?.trim();if(v)doStyleWith('${entry.id}',v)"
              style="padding:0 18px;background:var(--gold);color:#fff;border:none;border-radius:var(--r-sm);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;">
              Find →
            </button>
          </div>
        </div>`;
    })()}

      ${(()=>{
        const ol = S.outfitLinker?.mode === 'from-outfit' && S.outfitLinker?.entryId === entry.id ? S.outfitLinker : null;
        if (ol) {
          // Wardrobe picker mode — show all wardrobe items to select
          const sortedWardrobe = S.wardrobe.slice().sort((a,b) => (a.name||'').localeCompare(b.name));
          const selCount = Object.values(ol.selected).filter(Boolean).length;
          return `<div class="section">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
              <div class="section-title" style="margin-bottom:0;">Select Wardrobe Items Worn</div>
              <button onclick="S.outfitLinker=null;render()" style="background:none;border:none;font-size:22px;color:var(--text-3);cursor:pointer;padding:0;">✕</button>
            </div>
            <p style="font-size:12px;color:var(--text-3);margin-bottom:12px;">Tap each wardrobe item you're wearing in this outfit. This records a wear on those items.</p>
            ${sortedWardrobe.map(w => {
              const sel = !!ol.selected[w.id];
              return `<div onclick="toggleOutfitLink('${w.id}')" style="display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:var(--r-sm);margin-bottom:6px;cursor:pointer;
                background:${sel?'var(--gold-bg)':'var(--surface)'};border:${sel?'1.5px solid var(--gold)':'1.5px solid var(--border)'};transition:all .15s;">
                <div style="width:36px;height:36px;background:var(--surface-2);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;">${w.icon||'👕'}</div>
                <div style="flex:1;min-width:0;">
                  <div style="font-size:14px;font-weight:600;color:${sel?'var(--gold-dk)':'var(--text)'};">${esc(w.name)}</div>
                  ${w.brand ? `<div style="font-size:12px;color:var(--text-3);">${esc(w.brand)}</div>` : ''}
                </div>
                <div style="width:22px;height:22px;border-radius:50%;border:2px solid ${sel?'var(--gold)':'var(--border)'};background:${sel?'var(--gold)':'transparent'};display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;">
                  ${sel?`<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`:''}
                </div>
              </div>`;
            }).join('')}
            <div style="display:flex;gap:8px;margin-top:8px;">
              <button onclick="confirmOutfitLinks()" style="flex:1;padding:13px;border-radius:var(--r-sm);background:var(--gold);color:#fff;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;">
                Save (${selCount} item${selCount===1?'':'s'})
              </button>
              <button onclick="S.outfitLinker=null;render()" style="padding:13px 16px;border-radius:var(--r-sm);background:var(--surface);border:1px solid var(--border);font-size:14px;cursor:pointer;font-family:inherit;">Cancel</button>
            </div>
          </div>`;
        }
        // Normal items view
        return `<div class="section">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
            <div class="section-title" style="margin-bottom:0;">Items in This Outfit</div>
            <button onclick="openOutfitLinker('${entry.id}')" style="font-size:12px;color:var(--accent);background:none;border:none;padding:4px 0;cursor:pointer;font-family:inherit;font-weight:600;">✏️ Edit links</button>
          </div>
          ${entry.items.map(it => {
            const wm = findWardrobeMatch(it);
            if (wm) {
              const wmWears = wm.wears?.length || 0;
              const wmPrice = parseFloat(wm.price) || 0;
              const wmPpw = wmWears > 0 && wmPrice > 0 ? (wmPrice / wmWears).toFixed(2) : null;
              return `<div class="item-row" onclick="openWardrobeItem('${wm.id}')" style="cursor:pointer;">
                <div class="item-icon">${it.icon||'👕'}</div>
                <div class="item-info" style="flex:1;min-width:0;">
                  <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:6px;">
                    <div class="item-name" style="flex:1;">${esc(wm.name)}</div>
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--text-3)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;margin-top:3px;"><path d="M9 18l6-6-6-6"/></svg>
                  </div>
                  ${wm.brand ? `<div style="font-size:12px;color:var(--text-3);margin-bottom:2px;">${esc(wm.brand)}</div>` : ''}
                  <div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:5px;align-items:center;">
                    ${wmPrice > 0 ? `<span style="font-size:12px;color:var(--text-2);font-weight:600;">$${wmPrice.toFixed(2)}</span>` : ''}
                    ${wmWears > 0 ? `<span style="font-size:12px;color:var(--text-3);">Worn ${wmWears}×</span>` : ''}
                    ${wmPpw ? `<span style="font-size:11px;color:var(--gold-dk);background:var(--gold-bg);padding:2px 7px;border-radius:100px;font-weight:600;">$${wmPpw}/wear</span>` : ''}
                    ${wm.tailoringNeeded ? `<span style="font-size:11px;color:#7C3AED;background:#FAF5FF;padding:2px 7px;border-radius:100px;">🧵 Needs tailoring</span>` : ''}
                    ${wm.gifted ? `<span style="font-size:11px;color:#BE185D;background:#FDF2F8;padding:2px 7px;border-radius:100px;">🎁 Gift</span>` : ''}
                    ${wm.retiredFromCloset ? `<span style="font-size:11px;color:#6D28D9;background:#F5F3FF;padding:2px 7px;border-radius:100px;">📦 Retired</span>` : ''}
                  </div>
                </div>
              </div>`;
            }
            return `<div class="item-row">
              <div class="item-icon">${it.icon||'👕'}</div>
              <div class="item-info">
                <div class="item-name">${esc(it.name)}</div>
                <div class="item-no-price" style="cursor:pointer;" onclick="openOutfitLinker('${entry.id}')">Not linked to wardrobe — tap Edit links</div>
              </div>
            </div>`;
          }).join('')}
          ${totalCost>0?`
            <div class="total-row"><span class="total-label">Total Outfit Cost</span><span class="total-value">$${totalCost.toFixed(2)}</span></div>
            ${ppw?`<div class="ppw-chip"><div><div class="ppw-value">$${ppw}</div><div class="ppw-label">price per wear</div></div><div class="ppw-note">Worn ${entry.timesWorn}×<br>Tap "Worn" to update</div></div>`:`<p style="font-size:13px;color:var(--text-3);margin-top:10px;">Log a wear above to see price per wear.</p>`}`:''}
        </div>`;
      })()}

      ${entry.recommendations?.length?`
        <div class="section">
          <div class="section-title">Style Recommendations</div>
          <div class="rec-list">${entry.recommendations.map((r,i)=>{
            const reaction = entry.recReactions?.[r];
            const isLiked = reaction === 'liked';
            const isDismissed = reaction === 'dismissed';
            return `<div class="rec-item" style="${isDismissed?'opacity:0.38;':''}">
              <div class="rec-bullet">${i+1}</div>
              <div class="rec-text" style="${isDismissed?'text-decoration:line-through;':''}">${esc(r)}</div>
              <div style="display:flex;gap:4px;flex-shrink:0;margin-left:6px;">
                <button onclick="event.stopPropagation();setRecReaction('${entry.id}',${i},'liked')"
                  title="Save tip" style="background:none;border:none;cursor:pointer;font-size:16px;padding:2px;line-height:1;opacity:${isLiked?'1':'0.35'};transition:opacity .15s;">${isLiked?'♥':'♡'}</button>
                <button onclick="event.stopPropagation();setRecReaction('${entry.id}',${i},'dismissed')"
                  title="Dismiss" style="background:none;border:none;cursor:pointer;font-size:14px;padding:2px;line-height:1;opacity:${isDismissed?'1':'0.35'};transition:opacity .15s;color:var(--text-3);">✕</button>
              </div>
            </div>`;
          }).join('')}</div>
        </div>`:''}

      ${entry.shopResults?.length ? `
        <div class="section">
          <div class="section-title">🛍 Shop the Look</div>
          ${entry.shopResults.map(group => `
            <div class="shop-query-label">${esc(group.query)}</div>
            ${group.featuredImage
              ? `<div class="shop-featured-img-wrap" style="border-radius:var(--r-sm);overflow:hidden;margin-bottom:8px;">
                  <img class="shop-featured-img" src="${esc(group.featuredImage)}" alt="${esc(group.query)}"
                    onerror="this.parentElement.innerHTML='<div class=\\'shop-featured-img-placeholder\\'>🛍</div>'">
                </div>`
              : ''}
            ${group.items.map(it => `
              <a class="shop-card" href="${esc(it.link)}" target="_blank" rel="noopener">
                <div class="shop-card-info">
                  <div class="shop-card-title">${esc(it.title)}</div>
                  <div class="shop-card-domain">${esc(it.domain)}</div>
                </div>
                <svg class="shop-card-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
              </a>`).join('')}
          `).join('')}
        </div>` : (S.googleKey && S.googleCx && entry.shopQueries?.length ? `
        <div class="section">
          <div style="font-size:13px;color:var(--text-3);text-align:center;padding:12px;">No shopping results found for this outfit.</div>
        </div>` : '')}

      ${entry.notes?`
        <div class="section">
          <div class="section-title">Notes</div>
          <div style="font-size:14px;color:var(--text-2);line-height:1.65;padding:14px;background:var(--surface);border-radius:var(--r-sm);border:1px solid var(--border);">${esc(entry.notes)}</div>
        </div>`:''}
    </div>
    <div style="height:20px"></div>
    ${entry.rating===10 ? `
    <div style="margin:0 20px 14px;padding:16px;background:var(--gold);border-radius:var(--r);text-align:center;">
      <div style="font-size:20px;margin-bottom:6px;">🏆 Perfect 10!</div>
      <div style="font-size:13px;color:rgba(255,255,255,0.9);margin-bottom:12px;">This look is *chef's kiss* — share it with a friend!</div>
      <button onclick="shareOutfit('${entry.id}')" style="background:#fff;color:var(--gold-dk);border:none;border-radius:100px;padding:10px 24px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;">✨ Share this Look</button>
    </div>` : ''}
    <div class="actions-row">
      <button class="action-btn primary" onclick="startEdit()">${iconEdit()} Edit</button>
      <button class="action-btn" onclick="shareOutfit('${entry.id}')">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
        Share
      </button>
      <button class="action-btn danger"  onclick="showDeleteConfirm('${entry.id}')">${iconTrash()} Delete</button>
    </div>
    <div style="height:40px"></div>
  </div>`;
}

function viewEdit() {
  const entry = S.entries.find(e => e.id === S.selectedId);
  if (!entry) { navigate('closet'); return ''; }
  if (!S.draft) S.draft = JSON.parse(JSON.stringify(entry));
  const d = S.draft;

  return `<div class="view view-notab">
    <div class="nav">
      <button class="nav-back" onclick="cancelEdit()">${iconBack()} Cancel</button>
      <span class="nav-title">Edit Outfit</span>
      <button style="background:none;border:none;color:var(--gold);font-weight:700;font-size:16px;cursor:pointer;padding:4px 10px;font-family:inherit;" onclick="doSaveEdit()">Save</button>

    <div style="padding:16px 20px 20px;">
      <img style="width:100%;aspect-ratio:3/4;object-fit:cover;object-position:top;border-radius:var(--r);display:block;" src="${d.photo}" alt="Outfit">

          <div class="rec-bullet">${i+1}</div>
          <textarea class="form-textarea" style="min-height:64px;" oninput="S.draft.recommendations[${i}]=this.value">${esc(r)}</textarea>
        </div>`).join('')}
    </div>
    <div class="form-section">
      <label class="form-label">Notes</label>
      <textarea class="form-textarea" id="notesInput" placeholder="How did you feel? Where did you wear this?">${esc(d.notes||'')}</textarea>

/* ── Occasion tag management ─────────────────────────────── */
function addOccasionTag() {
  const input = document.getElementById('newOccasionInput');
  const val = (input?.value || '').trim();
  if (!val) return;
  const tags = getOccasionTags();
  if (tags.some(t => t.toLowerCase() === val.toLowerCase())) {
    toast('That activity is already in your list.');
    return;
  }
  tags.push(val);
  localStorage.setItem('closet-occasion-tags', JSON.stringify(tags)); fsSet('occasionTags', tags);
  if (input) input.value = '';
  render();
  toast(`"${val}" added ✓`);
}
function removeOccasionTag(index) {
  const tags = getOccasionTags();
  const removed = tags.splice(index, 1)[0];
  localStorage.setItem('closet-occasion-tags', JSON.stringify(tags)); fsSet('occasionTags', tags);
  render();
  toast(`"${removed}" removed`);
}
function resetOccasionTags() {
  localStorage.removeItem('closet-occasion-tags');
  render();
  toast('Activities reset to defaults ✓');
}

function launchConfetti() {
  const colors = ['#B87D2A','#FFD700','#FF69B4','#C8A96E','#9B8EA8','#FFFFFF'];
  const wrap = document.createElement('div');
  wrap.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:500;overflow:hidden;';
  for (let i = 0; i < 70; i++) {
    const p = document.createElement('div');
    const size = Math.random()*8+4;
    const delay = Math.random()*0.8;
    const dur   = Math.random()*2+2.5;
    p.style.cssText = `position:absolute;top:-20px;left:${Math.random()*100}%;width:${size}px;height:${size}px;background:${colors[Math.floor(Math.random()*colors.length)]};border-radius:${Math.random()>.5?'50%':'3px'};animation:confettiFall ${dur}s ${delay}s ease-in forwards;`;
    wrap.appendChild(p);
  }
  document.body.appendChild(wrap);
  setTimeout(()=>wrap.remove(), 5000);
}

// ── Style it with… ───────────────────────────────────────────────────────────
async function doStyleWith(entryId, need) {
  if (!need?.trim()) return;
  if (!S.apiKey) { toast('Add your Claude API key in Settings first.'); return; }

  const entry = S.entries.find(e => e.id === entryId);
  if (!entry) return;

  S.styleWith = { entryId, need: need.trim(), loading: true, result: null };
  render();

  try {
    // Extract base64 + mime from the stored data URL
    const dataUrl = entry.photo || '';
    const commaIdx = dataUrl.indexOf(',');
    const mime = dataUrl.slice(5, dataUrl.indexOf(';')) || 'image/jpeg';
    const b64 = dataUrl.slice(commaIdx + 1);

    const budgetLabel = { 1: 'budget / under $50', 2: 'mid-range / $50–$200', 3: 'luxury / $200+' }[S.shopBudget] || 'mid-range';

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': S.apiKey.trim(),
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 300,
        messages: [{
          role: 'user',
          content: [

Price tier: ${budgetLabel}

Return ONLY valid JSON (no markdown, no code fences):

}` }

// Save the links after the user confirms
async function confirmOutfitLinks() {
  if (!S.outfitLinker) return;
  const { mode, wardrobeId, entryId, selected } = S.outfitLinker;

  if (mode === 'from-wardrobe') {
    // User picked which OUTFITS contain this wardrobe item
    const w = S.wardrobe.find(i => i.id === wardrobeId);
    if (!w) { S.outfitLinker = null; render(); return; }
    if (!w.wears) w.wears = [];
    // Add newly selected outfit links
    for (const [oId, on] of Object.entries(selected)) {
      if (on && !w.wears.find(wr => wr.outfitId === oId)) {
        w.wears.push({ outfitId: oId, date: new Date().toISOString() });
      }
    }
    // Remove deselected outfit links
    w.wears = w.wears.filter(wr => selected[wr.outfitId] !== false);
    await DB.wardrobe.put(w);
    S.wardrobe = await DB.wardrobe.getAll();
    S.outfitLinker = null;
    render();
    toast(`Outfit links updated ✓`);
  } else {
    // mode === 'from-outfit': user picked which WARDROBE ITEMS are in this outfit
    const entry = S.entries.find(e => e.id === entryId);
    if (!entry) { S.outfitLinker = null; render(); return; }
    // For each wardrobe item: add/remove wear records for this outfit
    for (const w of S.wardrobe) {
      const shouldLink = !!selected[w.id];
      const alreadyLinked = w.wears?.some(wr => wr.outfitId === entryId);
      if (shouldLink && !alreadyLinked) {
        if (!w.wears) w.wears = [];
        w.wears.push({ outfitId: entryId, date: new Date().toISOString() });
        await DB.wardrobe.put(w);
      } else if (!shouldLink && alreadyLinked) {
        w.wears = w.wears.filter(wr => wr.outfitId !== entryId);
        await DB.wardrobe.put(w);
      }
    }
    S.wardrobe = await DB.wardrobe.getAll();
    S.outfitLinker = null;
    render();
    toast(`Wardrobe links updated ✓`);
  }
}

// Parse the receipt screenshot (or pasted text) with Claude haiku
async function parseReceipt() {
  const rf = S.receiptFlow;
  if (!rf) return;
  if (!rf.imageData && !rf.pasteText?.trim()) { toast('Upload a screenshot or paste some text first.'); return; }
  if (!S.apiKey) { toast('Add your Claude API key in Settings first.'); return; }

  rf.step = 'parsing'; render();

  try {
    const sysPrompt = `You parse retail receipt emails and order confirmations for a fashion wardrobe app. Extract exactly one clothing item (the primary item if multiple) and return ONLY valid JSON — no markdown, no extra text.`;

    const userContent = rf.imageData
      ? [
          { type: 'image', source: { type: 'base64', media_type: rf.imageMime, data: rf.imageData } },
          { type: 'text', text: `Parse this receipt screenshot and return ONLY this JSON (no code fences):
{
  "name": "full item name",
  "brand": "brand/store name or null",
  "price": 49.99,
  "description": "1-sentence description — color, style, material",
  "category": "Tops|Bottoms|Dresses|Outerwear|Shoes|Bags|Jewelry|Accessories",
  "icon": "single most fitting clothing emoji"
}` }
        ]
      : [{ type: 'text', text: `Parse this receipt text and return ONLY this JSON (no code fences):
{
  "name": "full item name",
  "brand": "brand/store name or null",
  "price": 49.99,
  "description": "1-sentence description — color, style, material if known",
  "category": "Tops|Bottoms|Dresses|Outerwear|Shoes|Bags|Jewelry|Accessories",
  "icon": "single most fitting clothing emoji"
}

Receipt text:
${rf.pasteText}` }];

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': S.apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 400,
        system: sysPrompt,
        messages: [{ role: 'user', content: userContent }],
      }),
    });

    if (!res.ok) throw new Error(`API error ${res.status}`);
    const data = await res.json();
    const text = data.content?.[0]?.text || '';
    // Strip any accidental markdown fences
    const cleaned = text.replace(/```[a-z]*\n?/gi, '').replace(/```/g, '').trim();
    const preview = JSON.parse(cleaned);

    // Coerce price to number
    if (preview.price && typeof preview.price === 'string') {
      preview.price = parseFloat(preview.price.replace(/[^0-9.]/g, '')) || null;
    }

    S.receiptFlow.preview = preview;
    S.receiptFlow.step = 'preview';
    render();
  } catch(e) {
    console.error('Receipt parse error:', e);
    S.receiptFlow.step = 'input';
    render();
    toast('Couldn\'t read that receipt — try a clearer screenshot or paste the text instead.');
  }
}

async function doSaveNew() {
  if (!S.draft) return;
  syncNotes();
  const entry = S.draft;
  await DB.entries.put(entry);
  S.entries = await DB.entries.getAll();
  S.selectedId = entry.id;
  clearPending();

  // Run occasion tagging + wardrobe matching + shopping + weather independently
  // Each op gets its own try/catch so any single failure never blocks match review
  Object.assign(S, { loading:true, loadingMsg:'Checking your wardrobe…' }); render();

  let tagResult = null, matchResult = { matches: [] }, shopResults = null, weatherResult = null;

  // tagOccasion is only needed if the user didn't pre-select an occasion before analysis
  if (!entry.occasionTag) {
    try { tagResult = await tagOccasion(entry.notes); } catch(e) { console.warn('tagOccasion failed', e); }
  }
  try {
    if (S.wardrobe.length > 0) matchResult = await matchToWardrobe(entry.items, S.wardrobe);
  } catch(e) { console.warn('matchToWardrobe failed', e); }
  try { shopResults = await fetchShopResults(entry.shopQueries); } catch(e) { console.warn('fetchShopResults failed', e); }
  try { weatherResult = await fetchCurrentWeather(); } catch(e) { console.warn('fetchCurrentWeather failed', e); }

  let needsSave = false;
  if (tagResult)            { entry.occasionTag  = tagResult;   needsSave = true; }
  if (shopResults?.length)  { entry.shopResults  = shopResults; needsSave = true; }
  if (weatherResult)        { entry.weather      = weatherResult; needsSave = true; }
  if (needsSave) {
    try { await DB.entries.put(entry); S.entries = await DB.entries.getAll(); } catch(e) { console.warn('entry save failed', e); }
  }

  const matchedNewIdxs = new Set((matchResult.matches||[]).map(m=>m.newIdx));
  // Default addOn to true only when wardrobe is small (building phase) or item looks new
  const isSmallWardrobe = S.wardrobe.length < 8;
  const unmatched = entry.items
    .map((item,idx) => ({ item, idx }))
    .filter(({idx}) => !matchedNewIdxs.has(idx))
    .map(({item, idx}) => ({ item, idx, addOn: isSmallWardrobe, price: item.price||'', brand: '' }));

  S.matchReview = {
    entryId: entry.id,
    matches: (matchResult.matches||[]).map(m => ({ ...m, on: true })),
    unmatched,
  };
  Object.assign(S, { loading:false, view:'match-review' }); render();
}

async function doConfirmMatchReview() {
  if (!S.matchReview) return navigate('detail');
  const { entryId, matches, unmatched } = S.matchReview;

  // Log wears for confirmed matches
  for (const m of matches.filter(m=>m.on)) {
    const wItem = S.wardrobe.find(w=>w.id===m.wardrobeId);
    if (wItem) {
      if (!wItem.wears) wItem.wears = [];
      if (!wItem.wears.find(wr=>wr.outfitId===entryId)) {
        wItem.wears.push({ outfitId:entryId, date:new Date().toISOString() });
        await DB.wardrobe.put(wItem);
      }
    }
  }

  // Link "this is actually..." items — log a wear on the existing wardrobe item
  for (const u of unmatched.filter(u => u.linkToId && !u.addOn)) {
    const wItem = S.wardrobe.find(w => w.id === u.linkToId);
    if (wItem) {
      if (!wItem.wears) wItem.wears = [];
      if (!wItem.wears.find(wr => wr.outfitId === entryId)) {
        wItem.wears.push({ outfitId: entryId, date: new Date().toISOString() });
        await DB.wardrobe.put(wItem);
      }
    }
  }

  // Add new wardrobe items (use edited name and selected category if provided)
  const _now = new Date();
  const _nowMonth = `${_now.getFullYear()}-${String(_now.getMonth()+1).padStart(2,'0')}`;
  for (const u of unmatched.filter(u => u.addOn && !u.linkToId)) {
    const itemName = (u.editedName||u.item.name).trim() || u.item.name;
    const itemCat  = u.selectedCat || categoryFromIcon(u.item.icon, itemName);
    const newItem = {
      id: uid(), name: itemName,
      description: u.description !== undefined ? u.description : (u.item.description || null),
      icon: u.item.icon||'👕', price: parseFloat(u.price)||null,
      brand: u.brand?.trim() || null,
      size: u.size?.trim() || null,
      category: itemCat,
      subCategory: subCategoryFromName(itemName, itemCat),
      paidOff: false, retiring: false, gifted: false,
      addedAt: new Date().toISOString(),
      wears: [{ outfitId:entryId, date:new Date().toISOString() }],
      isNew: u.isNew === true,
      purchasedDate: u.isNew === true ? _nowMonth : (u.purchasedDate || null),
    };
    await DB.wardrobe.put(newItem);
  }

  S.wardrobe = await DB.wardrobe.getAll();
  S.matchReview = null;
  switchTab('closet');
  toast('Outfit saved! ✨');
}

function skipMatchReview() { S.matchReview = null; switchTab('closet'); toast('Outfit saved! ✨'); }

function toggleMatch(i) {
  if (!S.matchReview) return;
  const m = S.matchReview.matches[i];
  m.on = !m.on;
  if (!m.on) {
    // Match was rejected — recover the outfit item into unmatched so user can handle it
    const entry = S.entries.find(e => e.id === S.matchReview.entryId);
    const outfitItem = entry?.items?.[m.newIdx];
    const alreadyUnmatched = S.matchReview.unmatched.find(u => u.idx === m.newIdx);
    if (outfitItem && !alreadyUnmatched) {
      S.matchReview.unmatched.unshift({ item: outfitItem, idx: m.newIdx, addOn: false, price: outfitItem.price||'', brand: '', _recovered: true });
    }
  } else {
    // Match re-confirmed — remove from unmatched if it was added back
    S.matchReview.unmatched = S.matchReview.unmatched.filter(u => u.idx !== m.newIdx);
  }
  render();
}
function toggleUnmatched(i) {
  if (!S.matchReview) return;

async function generateWardrobeSketchFromPhoto(id, file) {
  const w = S.wardrobe.find(i => i.id === id);
  if (!w) return;

  const key = S.apiKey?.trim();
  if (!key) {
    toast('Add your Claude API key in Settings to sketch from photos.');
    return;
  }

  toast('Analyzing your photo… 📸');

  try {
    // Compress image before sending
    const { data: dataUrl, mime } = await compressImage(file);
    const b64 = dataUrl.split(',')[1];

    // Ask Claude to describe the clothing item for a sketch prompt
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 180,
        messages: [{
          role: 'user',
          content: [
            {
              type: 'image',
              source: { type: 'base64', media_type: mime, data: b64 }
            },
            {
              type: 'text',
              text: 'Describe this clothing item for a fashion flat sketch. Include: garment type, silhouette/cut, collar/neckline, sleeve style, hem length, closure type, any notable design details or embellishments, and visible texture or fabric. One or two concise sentences only — no preamble, just the description.'
            }
          ]
        }]
      })
    });

    if (!res.ok) throw new Error(`API ${res.status}`);
    const json = await res.json();
    const description = json.content?.[0]?.text?.trim();
    if (!description) throw new Error('Empty response');

    // Build Pollinations URL using Claude's description as the prompt
    const prompt = `fashion flat sketch illustration, ${description}, clean minimalist line art, white background, fashion design technical drawing, professional apparel sketch, no model, no person`;
    const sketchUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=512&height=512&model=flux&nologo=true&seed=${hashStr(description)}`;

    w.sketch = sketchUrl;
    await DB.wardrobe.put(w);
    S.wardrobe = await DB.wardrobe.getAll();
    render();
    toast('Sketch generating from your photo 🎨');

  } catch(e) {
    console.error('generateWardrobeSketchFromPhoto', e);
    toast('Couldn\'t analyze the photo — check your API key and try again.');
  }
}

function handleMemorialPhoto(id, input) {
  const file = input.files?.[0]; if (!file) return;

    const comma = dataUrl.indexOf(',');
    const base64 = dataUrl.slice(comma + 1);
    const mime = file.type || 'image/jpeg';
    if (S.memorialFlow && S.memorialFlow.id === id) {

  if (!S.memorialFlow || S.memorialFlow.id !== id) return;
  // Capture whatever is currently in the textarea
  const textareaEl = document.getElementById(`eulogyTextarea_${id}`);
  const raw = (textareaEl ? textareaEl.value : S.memorialFlow.note || '').trim();

  const w = S.wardrobe.find(i => i.id === id);
  const itemName = w ? w.name : 'this piece';
  S.eulogyPolishing = true; render();
  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 250,
        messages: [{
          role: 'user',
          content: `You are helping someone write a short, warm memorial for a beloved clothing item they are retiring from their wardrobe. The item is called "${itemName}".

Here is what they wrote:
"${raw}"

Please rewrite this as a short, heartfelt eulogy — keep their voice and all their details, but give it warmth, a little poetry, and emotional resonance. It should feel personal and genuine, not generic. Keep it to 2–4 sentences. Return only the revised text, no quotes, no preamble.`,

async function shareGiftWear(id) {
  const w = S.wardrobe.find(i=>i.id===id); if (!w) return;
  const outfits = (w.wears||[])
    .map(wr => S.entries.find(e => e.id === wr.outfitId))
    .filter(Boolean)
    .sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
  const latest = outfits[0];
  if (!latest) { toast('Log an outfit wearing this piece first!'); return; }
  const gifterName = w.giftedBy || 'you';
  const rating = latest.rating;
  const ratingLine = rating ? `It got a ${rating}/10 style rating from my AI stylist!` : '';
  const caption = [`Hey ${gifterName}! \u{1F497}`,
    `Just wanted to let you know I’m wearing the ${w.name} you gifted me today.`,
    ratingLine, `Thanks for the amazing gift! \u{1F64F}`].filter(Boolean).join(' ');
  try {
    if (latest.photo && navigator.canShare) {
      const blob = await (await fetch(latest.photo)).blob();
      const file = new File([blob], 'outfit.jpg', { type: blob.type });
      if (navigator.canShare({ files: [file] })) {
        await navigator.share({ title: 'Wearing your gift!', text: caption, files: [file] });
        return;
      }
    }
    if (navigator.share) {
      await navigator.share({ title: 'Wearing your gift!', text: caption });
      return;
    }
  } catch(e) { if (e.name === 'AbortError') return; }
  try {
    await navigator.clipboard.writeText(caption);
    toast('Message copied to clipboard — paste it to share! \u{1F497}');
  } catch { toast('Shared!'); }
}

function initFilterFade(wrapperId) {
  const wrap = document.getElementById(wrapperId);
  if (!wrap) return;
  const bar = wrap.querySelector('.filter-bar');
  if (!bar) return;
  function update() {
    const atStart = bar.scrollLeft < 8;
    const atEnd   = bar.scrollLeft >= bar.scrollWidth - bar.clientWidth - 8;
    wrap.classList.toggle('at-start', atStart);
    wrap.classList.toggle('at-end',   atEnd);
  }
  bar.addEventListener('scroll', update, { passive: true });
  update(); // run once on attach
}

function attachListeners() {
  const fi = document.getElementById('fileInput');
  if (fi) fi.onchange = handleFile;
  if (S.view === 'crop') initCrop();
  // Filter bar fade edges
  ['fbw-closet','fbw-wcat','fbw-wsub','fbw-wsort'].forEach(initFilterFade);
  // News flash swipe-to-dismiss
  const nf = document.getElementById('newsflash');
  if (nf) {
    let sx = 0, sy = 0;
    nf.addEventListener('touchstart', e => { sx = e.touches[0].clientX; sy = e.touches[0].clientY; nf.style.transition = 'none'; }, { passive: true });
    nf.addEventListener('touchmove', e => {
      const dx = e.touches[0].clientX - sx;
      const dy = Math.abs(e.touches[0].clientY - sy);
      if (dx < 0 && Math.abs(dx) > dy) {
        nf.style.transform = `translateX(${dx}px)`;
        nf.style.opacity = String(Math.max(0, 1 + dx / 180));
      }
    }, { passive: true });
    nf.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - sx;
      nf.style.transition = 'transform .25s ease, opacity .25s ease';
      if (dx < -80) {
        nf.style.transform = 'translateX(-110%)'; nf.style.opacity = '0';
        setTimeout(dismissNewsFlash, 260);
      } else {
        nf.style.transform = ''; nf.style.opacity = '';
      }
    }, { passive: true });
  }

  // Shop card swipe-left to block
  document.querySelectorAll('.shop-swipe-card').forEach(card => {
    let sx = 0, sy = 0, dx = 0;
    card.addEventListener('touchstart', e => {
      sx = e.touches[0].clientX; sy = e.touches[0].clientY; dx = 0;
      card.style.transition = 'none';
    }, { passive: true });
    card.addEventListener('touchmove', e => {
      dx = e.touches[0].clientX - sx;
      const dy = Math.abs(e.touches[0].clientY - sy);
      if (dx < 0 && Math.abs(dx) > dy) {
        card.style.transform = `translateX(${dx}px)`;
        card.style.opacity = String(Math.max(0.25, 1 + dx / 220));
      }
    }, { passive: true });
    card.addEventListener('touchend', () => {
      card.style.transition = 'transform .25s ease, opacity .25s ease';
      if (dx < -90) {
        card.style.transform = 'translateX(-110%)';
        card.style.opacity = '0';
        const query = card.dataset.query;
        setTimeout(() => blockShopItem(query), 260);
      } else {
        card.style.transform = ''; card.style.opacity = '';
      }
    }, { passive: true });
  });

  // Suggestion carousel dot tracker
  const suggCarousel = document.getElementById('suggCarousel');
  if (suggCarousel) {
    suggCarousel.addEventListener('scroll', () => {
      const cardW = suggCarousel.firstElementChild?.offsetWidth || 1;
      const idx = Math.min(
        Math.round(suggCarousel.scrollLeft / (cardW + 12)),
        (S.plan.suggestions?.length || 1) - 1
      );
      document.querySelectorAll('[id^="sdot-"]').forEach((d, i) =>
        d.classList.toggle('active', i === idx)
      );
    }, { passive: true });
  }
  const zone = document.getElementById('uploadZone');
  if (zone) {
    zone.ondragover = e => { e.preventDefault(); zone.classList.add('dragover'); };
    zone.ondragleave = () => zone.classList.remove('dragover');
    zone.ondrop = e => {
      e.preventDefault(); zone.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file?.type.startsWith('image/')) handleFile({ target:{ files:[file], value:'' } });
    };
  }
}

/* ================================================================
   INIT
   ================================================================ */
// Handle redirect result from Google Sign-In (fires after returning from Google's page)
auth.getRedirectResult().catch(e => {
  if (e.code !== 'auth/no-auth-event') {
    console.error('Redirect sign-in error:', e);
    toast('Sign-in failed: ' + (e.message || 'Unknown error'));
    S.view = 'signin'; render();
  }
});

// Firebase Auth state drives the entire app boot sequence
auth.onAuthStateChanged(async (user) => {
  if (!user) {
    currentUser = null;
    S.view = 'signin';
    render();
    return;
  }
  // User is signed in — show loading, then fetch data
  currentUser = user;
  S.view = 'loading';
  render();
  try {
    // Load profile settings from Firestore (overrides localStorage defaults)
    await loadProfileFromFirestore();
    // Load entries and wardrobe from Firestore
    [S.entries, S.wardrobe] = await Promise.all([
      DB.entries.getAll(),
      DB.wardrobe.getAll(),
    ]);
    S.view = S.apiKey ? 'closet' : 'setup';
    S.activeTab = S.apiKey ? 'closet' : S.activeTab;
  } catch(e) {
    console.error('Data load failed:', e);
    S.view = S.apiKey ? 'closet' : 'setup';
  }
  render();
  if (S.apiKey) initNewsFlash();
  initWeatherPin();
});
</script>
