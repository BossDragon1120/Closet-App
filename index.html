    </div>

    <!-- Header: avatar + name + chips -->
    <div style="padding:16px 16px 14px;display:flex;gap:16px;align-items:flex-start;">
      ${avatarHTML}
      <div style="flex:1;min-width:0;">
        <div style="font-size:22px;font-weight:900;letter-spacing:-.3px;margin-bottom:3px;">${S.profileName ? esc(S.profileName) : 'My Closet'}</div>
        ${S.profileStyleWords ? `<div style="font-size:12px;color:var(--text-2);line-height:1.5;margin-bottom:8px;">${esc(S.profileStyleWords.length>80?S.profileStyleWords.slice(0,80)+'…':S.profileStyleWords)}</div>` : ''}
        ${chipsHTML}
      </div>
    </div>

    <!-- Style Portrait — top of page -->
    <div style="padding:0 16px 16px;">${portraitHTML}</div>

    <div style="height:1px;background:var(--border);margin:0 16px 20px;"></div>

    <!-- Top Rated Looks carousel -->
    ${topLooksHTML}
    ${topLooksHTML ? `<div style="height:1px;background:var(--border);margin:0 16px 20px;"></div>` : ''}

    <!-- Liked recommendations carousel -->
    ${likedRecsHTML}
    ${likedRecsHTML ? `<div style="height:1px;background:var(--border);margin:0 16px 20px;"></div>` : ''}

    <!-- Stats row: style score + streak -->
    <div style="display:flex;gap:10px;padding:0 16px 20px;">
      <div style="flex:1;background:var(--surface);border-radius:12px;padding:12px 14px;border:1px solid var(--border);text-align:center;">
        <div style="font-size:26px;font-weight:900;color:var(--gold);letter-spacing:-.5px;">${avgRating}</div>
        <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);margin-top:2px;">Style Score</div>
      </div>
      <div style="flex:2;background:var(--surface);border-radius:12px;padding:12px 14px;border:1px solid var(--border);">
        ${streakHTML}
      </div>
    </div>

    ${mostWornHTML ? `<div style="padding:0 16px 20px;">${mostWornHTML}</div><div style="height:1px;background:var(--border);margin:0 16px 20px;"></div>` : ''}

    ${profileSection('Brand Affinity', brandsHTML)}
    <div style="height:1px;background:var(--border);margin:0 16px 20px;"></div>
    ${profileSection('Top Activities', activitiesHTML)}
    <div style="height:1px;background:var(--border);margin:0 16px 24px;"></div>

    <!-- YOUR AURA -->
    <div style="padding:0 16px;margin-bottom:6px;">
      <div style="font-size:18px;font-weight:900;letter-spacing:-.3px;color:var(--text);margin-bottom:3px;">✦ Your Aura</div>
      <div style="font-size:12px;color:var(--text-3);margin-bottom:14px;line-height:1.5;">The details that make you, <em>you</em> — beyond just the clothes.</div>
      ${auraGrid}
    </div>

    <div style="height:16px;"></div>
    ${profileSection('🌸 Signature Scent', scentBlock)}
    ${profileSection('💇 Current Hairstyle', hairBlock)}

    <div style="height:40px;"></div>
  </div>`;
}

/* ================================================================
   VIEW: HOME
   ================================================================ */
function viewHome() {
  const name = S.profileName ? `${S.profileName}'s` : 'Your';
  const activeWardrobe = S.wardrobe.filter(w => !w.retiredFromCloset);

  // ── Stats ─────────────────────────────────────────────────
  const avgRating = styleScore(S.entries) || '—';
  const totalWears = S.wardrobe.reduce((s,w)=>s+(w.wears?.length||0),0);
  const avgWearsPerItem = (() => {
    const itemsWithWears = activeWardrobe.filter(w=>(w.wears?.length||0)>0);
    if (!itemsWithWears.length) return '—';
    const total = itemsWithWears.reduce((s,w)=>s+(w.wears?.length||0),0);
    return (total/itemsWithWears.length).toFixed(1);
  })();

  // ── Top outfits (rated 8+, for carousel) ─────────────────
  const topOutfits = [...S.entries]
    .filter(e => e.rating >= 8 && !e.doNotRepeat)
    .sort((a,b) => b.rating - a.rating || new Date(b.createdAt) - new Date(a.createdAt))
    .slice(0, 10);
  const topOutfitEntry = topOutfits[0] || (S.entries.length ? [...S.entries].filter(e=>!e.doNotRepeat).sort((a,b)=>b.rating-a.rating)[0] : null);

  // ── Most worn item ────────────────────────────────────────
  const topWornItem = activeWardrobe.filter(w=>(w.wears?.length||0)>0)
    .sort((a,b)=>b.wears.length-a.wears.length)[0] || null;
  const topWornAvgDays = (() => {
    if (!topWornItem || topWornItem.wears.length < 2) return null;
    const dated = topWornItem.wears.map(wr=>new Date(wr.date||0)).filter(d=>d>0).sort((a,b)=>a-b);
    if (dated.length < 2) return null;
    const spanDays = (dated[dated.length-1] - dated[0]) / 86400000;
    return Math.round(spanDays / (dated.length - 1));
  })();

  // ── This week ─────────────────────────────────────────────
  const weekHTML = (() => {
    const offset = S.dashCalOffset || 0;
    const today = new Date(); today.setHours(0,0,0,0);
    const toKey = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const todayKey = toKey(today);
    const weekStart = new Date(today);
    weekStart.setDate(today.getDate() - today.getDay() + offset * 7);
    const weekEnd = new Date(weekStart); weekEnd.setDate(weekStart.getDate() + 6);
    const fmtShort = d => d.toLocaleDateString('en-US', {month:'short', day:'numeric'});
    const weekLabel = `${fmtShort(weekStart)} – ${fmtShort(weekEnd)}`;

    const byDay = {};
    S.entries.forEach(e => {
      const k = toKey(new Date(e.createdAt));
      if (!byDay[k]) byDay[k] = [];
      byDay[k].push(e);
    });

    let streak = 0;
    const si = byDay[todayKey] ? 0 : 1;
    for (let i = si; i < 365; i++) {
      const d = new Date(today); d.setDate(d.getDate()-i);
      if (byDay[toKey(d)]) streak++; else break;
    }

    const dowLabels = ['Su','Mo','Tu','We','Th','Fr','Sa'];
    const cells = Array.from({length:7},(_,i)=>{
      const day = new Date(weekStart); day.setDate(weekStart.getDate()+i);
      const isFuture = day > today;
      const isToday  = toKey(day) === todayKey;
      const key = toKey(day);
      const dayEntries = byDay[key] || [];
      const phase = cyclePhaseForDate(day);
      const phaseBar = phase ? `<div class="cal-wc-phase ${CYCLE_PHASES[phase].cls}"></div>` : '';
      const todayCls = isToday ? ' cal-today' : '';
      const futureCls = isFuture ? ' cal-future' : '';
      if (dayEntries.length) {
        const best = dayEntries.reduce((b,e)=>e.rating>b.rating?e:b, dayEntries[0]);
        const rCls = best.rating>=8?'r-high':best.rating>=6?'r-mid':'r-low';
        return `<div class="cal-wc logged ${rCls}${todayCls}" onclick="openEntry('${best.id}')">
          <div class="cal-wc-dow">${dowLabels[i]}</div>
          <div class="cal-wc-date">${day.getDate()}</div>
          <div class="cal-wc-score">${best.rating}</div>${phaseBar}</div>`;
      }
      return `<div class="cal-wc${futureCls}${todayCls}">
        <div class="cal-wc-dow">${dowLabels[i]}</div>
        <div class="cal-wc-date" style="color:var(--text-3);">${day.getDate()}</div>
        <div class="cal-wc-empty">—</div>${phaseBar}</div>`;
    }).join('');

    const streakTxt = streak > 0
      ? `🔥 ${streak}-day streak`
      : `📅 Log today's look`;

    return `<div class="home-section">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
        <div class="home-section-label" style="margin-bottom:0;">This Week</div>
        <div style="display:flex;align-items:center;gap:6px;">
          <button class="cal-nav-btn" style="font-size:16px;padding:0 6px;" onclick="S.dashCalOffset=(S.dashCalOffset||0)-1;render()">‹</button>
          <span style="font-size:11px;color:var(--text-3);font-weight:600;">${weekLabel}</span>
          <button class="cal-nav-btn" style="font-size:16px;padding:0 6px;" onclick="S.dashCalOffset=Math.min(0,(S.dashCalOffset||0)+1);render()"${offset>=0?' disabled':''}>›</button>
        </div>
      </div>
      <div style="font-size:11px;color:var(--gold-dk);font-weight:700;margin-bottom:6px;">${streakTxt}</div>
      <div class="cal-week-row">${cells}</div>
    </div>`;
  })();

  // ── Collapsible dash sections (reused from Dashboard) ─────
  const sortedAll = [...S.entries].sort((a,b)=>new Date(a.createdAt)-new Date(b.createdAt));
  const scoredEntries = sortedAll.filter(e=>!isWFH(e));

  const mostWorn = [...S.wardrobe].filter(w=>(w.wears?.length||0)>0)
    .sort((a,b)=>b.wears.length-a.wears.length).slice(0,5);
  const gems = S.wardrobe.filter(w=>w.price && !w.paidOff && (w.wears?.length||0)<3)
    .sort((a,b)=>b.price-a.price).slice(0,4);
  const brandCounts = {};
  S.wardrobe.forEach(w=>{ if(w.brand) brandCounts[w.brand]=(brandCounts[w.brand]||0)+(w.wears?.length||1); });
  const topBrands = Object.entries(brandCounts).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const tagCounts = {};
  S.entries.forEach(e=>{ if(e.occasionTag) tagCounts[e.occasionTag]=(tagCounts[e.occasionTag]||0)+1; });
  const topTags = Object.entries(tagCounts).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const maxTagCount = topTags[0]?.[1]||1;

  function homeSection(key, titleHTML, contentHTML, extraCardStyle='') {
    const open = !!S.dashExpanded[key];
    return `<div class="home-section" style="padding-bottom:4px;">
      <div class="dash-card" style="${extraCardStyle}">
        <button class="dash-section-hdr ${open?'open':''}" onclick="S.dashExpanded['${key}']=!S.dashExpanded['${key}'];render()">
          <div class="dash-section-title">${titleHTML}</div>
          <span class="dash-chevron">▶</span>
        </button>
        ${open ? `<div class="dash-section-body">${contentHTML}</div>` : ''}
      </div>
    </div>`;
  }

  const hasData = S.entries.length > 0 || activeWardrobe.length > 0;

  // ── Highlight cards ───────────────────────────────────────
  // Best outfits section: carousel if 2+, single card if only one
  const bestOutfitHTML = (() => {
    if (!topOutfitEntry) return '<div></div>';
    const makeCard = (e, isCarousel) => `
      <div onclick="openEntry('${e.id}')" style="
        border-radius:var(--r);overflow:hidden;position:relative;cursor:pointer;
        aspect-ratio:3/4;background:#111;flex-shrink:0;
        ${isCarousel ? 'width:140px;' : 'width:100%;'}
      ">
        ${e.photo
          ? `<img src="${e.photo}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:top;">`
          : `<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:44px;">👗</div>`}
        <div style="position:absolute;inset:0;background:linear-gradient(to bottom,transparent 30%,rgba(0,0,0,0.85) 100%);"></div>
        <div style="position:absolute;top:7px;left:7px;background:var(--gold);color:#fff;font-size:8px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;padding:2px 6px;border-radius:100px;">${e === topOutfits[0] ? 'Best Outfit' : '⭐ ' + e.rating}</div>
        <div style="position:absolute;bottom:0;left:0;right:0;padding:8px 9px;">
          <div style="font-size:${isCarousel?'16px':'20px'};font-weight:900;color:#fff;line-height:1;">⭐ ${e.rating}<span style="font-size:11px;font-weight:600;opacity:.7;">/10</span></div>
          ${e.occasionTag ? `<div style="font-size:9px;color:rgba(255,255,255,0.6);margin-top:2px;">${esc(e.occasionTag)}</div>` : ''}
          <div style="font-size:9px;color:rgba(255,255,255,0.4);margin-top:1px;">${fmtDate(e.createdAt)}</div>
        </div>
      </div>`;
    if (topOutfits.length >= 2) {
      return `<div style="position:relative;">
        <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-3);padding:0 16px 8px;">Best Outfits</div>
        <div style="display:flex;gap:10px;overflow-x:auto;padding:0 16px 4px;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none;">
          ${topOutfits.map(e => `<div style="scroll-snap-align:start;flex-shrink:0;">${makeCard(e, true)}</div>`).join('')}
        </div>
      </div>`;
    }
    return makeCard(topOutfitEntry, false);
  })();

  // Vertical card — used when side-by-side with a single top outfit
  const mostWornCardVertical = topWornItem ? (() => {
    const wc = topWornItem.wears.length;
    const dotsHTML = Array.from({length:Math.min(wc,18)}, () =>
      `<div style="width:8px;height:8px;border-radius:50%;background:var(--gold);flex-shrink:0;"></div>`
    ).join('') + (wc > 18 ? `<div style="font-size:9px;color:rgba(255,255,255,0.4);align-self:center;margin-left:2px;">+${wc-18}</div>` : '');
    return `<div onclick="openWardrobeItem('${topWornItem.id}')" style="border-radius:var(--r);background:linear-gradient(160deg,#1C1A18 0%,#2A2218 100%);padding:14px 12px;cursor:pointer;display:flex;flex-direction:column;justify-content:space-between;aspect-ratio:3/4;position:relative;overflow:hidden;">
      <div style="position:absolute;inset:0;background:radial-gradient(ellipse at 80% 110%,rgba(184,125,42,0.18) 0%,transparent 65%);pointer-events:none;"></div>
      <div>
        <div style="font-size:9px;font-weight:800;letter-spacing:.12em;color:var(--gold);text-transform:uppercase;margin-bottom:6px;position:relative;">Most Worn</div>
        <div style="font-size:36px;line-height:1;margin-bottom:8px;">${topWornItem.icon||'👕'}</div>
        <div style="font-size:13px;font-weight:700;color:#fff;line-height:1.25;margin-bottom:2px;position:relative;">${esc(topWornItem.name)}</div>
        ${topWornItem.brand ? `<div style="font-size:11px;color:rgba(255,255,255,0.4);">${esc(topWornItem.brand)}</div>` : ''}
      </div>
      <div style="position:relative;">
        <div style="font-size:28px;font-weight:900;color:var(--gold);line-height:1;">${wc}<span style="font-size:14px;font-weight:600;opacity:.7;">×</span></div>
        <div style="font-size:10px;color:rgba(255,255,255,0.38);margin-bottom:8px;">${topWornAvgDays ? `every ~${topWornAvgDays} days` : `${wc} wear${wc===1?'':'s'} total`}</div>
        <div style="display:flex;flex-wrap:wrap;gap:3px;">${dotsHTML}</div>
      </div>
    </div>`;
  })() : null;

  // Horizontal card — used below the carousel so it spans full width
  const mostWornCardHorizontal = topWornItem ? (() => {
    const wc = topWornItem.wears.length;
    const dotCount = Math.min(wc, 24);
    const dotsHTML = Array.from({length:dotCount}, () =>
      `<div style="width:7px;height:7px;border-radius:50%;background:var(--gold);flex-shrink:0;"></div>`
    ).join('') + (wc > 24 ? `<div style="font-size:9px;color:rgba(255,255,255,0.4);align-self:center;margin-left:3px;">+${wc-24}</div>` : '');
    return `<div onclick="openWardrobeItem('${topWornItem.id}')" style="border-radius:var(--r);background:linear-gradient(135deg,#1C1A18 0%,#2A2218 100%);padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:14px;position:relative;overflow:hidden;">
      <div style="position:absolute;inset:0;background:radial-gradient(ellipse at 100% 50%,rgba(184,125,42,0.15) 0%,transparent 60%);pointer-events:none;"></div>
      <div style="font-size:42px;line-height:1;flex-shrink:0;position:relative;">${topWornItem.icon||'👕'}</div>
      <div style="flex:1;min-width:0;position:relative;">
        <div style="font-size:9px;font-weight:800;letter-spacing:.12em;color:var(--gold);text-transform:uppercase;margin-bottom:3px;">Most Worn</div>
        <div style="font-size:15px;font-weight:800;color:#fff;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(topWornItem.name)}</div>
        ${topWornItem.brand ? `<div style="font-size:11px;color:rgba(255,255,255,0.38);margin-bottom:6px;">${esc(topWornItem.brand)}</div>` : '<div style="margin-bottom:6px;"></div>'}
        <div style="display:flex;flex-wrap:wrap;gap:3px;align-items:center;">${dotsHTML}</div>
      </div>
      <div style="text-align:right;flex-shrink:0;position:relative;">
        <div style="font-size:32px;font-weight:900;color:var(--gold);line-height:1;">${wc}<span style="font-size:14px;font-weight:600;opacity:.7;">×</span></div>
        <div style="font-size:10px;color:rgba(255,255,255,0.38);margin-top:2px;">${topWornAvgDays ? `every ~${topWornAvgDays}d` : 'total wears'}</div>
      </div>
    </div>`;
  })() : null;

  const highlightHTML = (topOutfitEntry || topWornItem) ? (() => {
    if (topOutfits.length >= 2) {
      // Carousel full-width + horizontal most-worn below
      return `
        <div style="padding:14px 0 0;">
          ${bestOutfitHTML}
          ${mostWornCardHorizontal ? `<div style="padding:10px 16px 0;">${mostWornCardHorizontal}</div>` : ''}
        </div>`;
    }
    // Single best outfit + vertical most worn side by side
    return `<div style="padding:14px 16px 0;display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      ${bestOutfitHTML}
      ${mostWornCardVertical || '<div></div>'}
    </div>`;
  })() : '';

  return `<div class="view">
    <div class="nav">
      <span class="nav-logo">Closet ✦</span>
      <button class="nav-add" onclick="navigate('upload')">${iconPlus()} New Outfit</button>
    </div>
    <div class="tab-headline">Your style, your story.</div>

    ${!hasData ? `<div class="empty" style="padding-top:52px;">
      <div class="empty-icon">✨</div>
      <h2>Welcome to your Closet!</h2>
      <p>Log your first outfit or add wardrobe items to get started. Your style portrait will come to life as you use the app.</p>
    </div>` : ''}

    ${S.weatherPin ? `
    <div onclick="switchTab('plan')" style="margin:10px 16px 0;display:flex;align-items:center;gap:9px;padding:9px 13px;background:var(--surface);border-radius:var(--r-sm);border:1px solid var(--border);cursor:pointer;transition:background .15s;" onmouseenter="this.style.background='var(--surface-2)'" onmouseleave="this.style.background='var(--surface)'">
      <span style="font-size:18px;line-height:1;flex-shrink:0;">${S.weatherPin.icon}</span>
      <div style="flex:1;min-width:0;">
        <div style="font-size:11px;font-weight:700;color:var(--text-3);display:flex;align-items:center;gap:4px;margin-bottom:2px;">
          <span>📍</span>
          <span>${esc(S.weatherPin.city)}</span>
          <span style="opacity:.5;">·</span>
          <span>${S.weatherPin.tempF}°F</span>
        </div>
        <div style="font-size:12px;color:var(--text-2);font-style:italic;line-height:1.35;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(S.weatherPin.quip)}</div>
      </div>
    </div>` : ''}

    ${newsFlashHTML()}

    ${highlightHTML}

    ${weekHTML}

    ${gems.length ? homeSection('gems','💎 Hidden Gems',
      gems.map(w=>`
        <div class="dash-item-row" onclick="openWardrobeItem('${w.id}')">
          <div class="wardrobe-icon" style="width:40px;height:40px;font-size:20px;border-radius:10px;">${w.icon||'👕'}</div>
          <div class="dash-item-info">
            <div class="dash-item-name">${esc(w.name)}</div>
            <div class="dash-item-sub">$${parseFloat(w.price).toFixed(0)} paid · worn ${w.wears?.length||0}×</div>
          </div>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text-3)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
        </div>`).join('')) : ''}

    ${topBrands.length ? homeSection('brands','🏷 Top Brands',
      topBrands.map(([brand,count])=>`
        <div class="dash-bar-row">
          <div class="dash-bar-label" style="min-width:90px;">${esc(brand)}</div>
          <div class="dash-bar-wrap"><div class="dash-bar-fill" style="width:${Math.round((count/topBrands[0][1])*100)}%"></div></div>
          <div class="dash-bar-count">${count}w</div>
        </div>`).join('')) : ''}

    ${topTags.length ? homeSection('occasions','🎭 Top Activities',
      topTags.map(([tag,count])=>`
        <div class="dash-bar-row">
          <div class="dash-bar-label">${esc(tag)}</div>
          <div class="dash-bar-wrap"><div class="dash-bar-fill" style="width:${Math.round((count/maxTagCount)*100)}%"></div></div>
          <div class="dash-bar-count">${count}</div>
        </div>`).join('')) : ''}

    ${mostWorn.length ? homeSection('worn','🔥 Most Worn',
      mostWorn.map((w,i)=>`
        <div class="dash-item-row" onclick="openWardrobeItem('${w.id}')">
          <div class="dash-rank">${i+1}</div>
          <div class="wardrobe-icon" style="width:40px;height:40px;font-size:20px;border-radius:10px;">${w.icon||'👕'}</div>
          <div class="dash-item-info">
            <div class="dash-item-name">${esc(w.name)}</div>
            <div class="dash-item-sub">${w.wears.length} wear${w.wears.length===1?'':'s'}${w.price&&w.wears.length?` · $${(w.price/w.wears.length).toFixed(2)}/wear`:''}</div>
          </div>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text-3)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
        </div>`).join('')) : ''}

    ${(()=>{
      // Liked recommendations carousel — bottom of home
      const likedRecs = [];
      S.entries.forEach(e => {
        if (!e.recReactions) return;
        (e.recommendations||[]).forEach(r => {
          if (e.recReactions[r] === 'liked') likedRecs.push({ rec: r, entry: e });
        });
      });
      if (!likedRecs.length) return '';
      return `<div style="margin-top:10px;margin-bottom:6px;">
        <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-3);padding:0 16px 8px;">♥ Saved Style Tips</div>
        <div style="display:flex;gap:10px;overflow-x:auto;padding:0 16px 12px;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none;">
          ${likedRecs.map(({rec, entry}) => `
            <div onclick="openEntry('${entry.id}')" style="scroll-snap-align:start;flex-shrink:0;width:220px;cursor:pointer;
              border-radius:var(--r);background:var(--surface);border:1.5px solid var(--border);overflow:hidden;display:flex;flex-direction:column;">
              ${entry.photo ? `<div style="width:100%;height:80px;overflow:hidden;flex-shrink:0;">
                <img src="${entry.photo}" style="width:100%;height:100%;object-fit:cover;object-position:top;" alt="Outfit">
              </div>` : `<div style="width:100%;height:80px;background:var(--surface-2);display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0;">👗</div>`}
              <div style="padding:10px 12px 12px;flex:1;">
                <div style="font-size:8px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--gold-dk);margin-bottom:5px;">Style tip</div>
                <div style="font-size:13px;color:var(--text);line-height:1.45;">${esc(rec)}</div>
                <div style="font-size:11px;color:var(--text-3);margin-top:6px;">⭐ ${entry.rating}/10 · ${entry.occasionTag ? esc(entry.occasionTag) : fmtDateLong(entry.createdAt)}</div>
              </div>
            </div>`).join('')}
        </div>
      </div>`;
    })()}

    <div style="height:16px"></div>
  </div>`;
}

/* ================================================================
   VIEW: DASHBOARD
   ================================================================ */
function viewDashboard() {
  if (!S.entries.length) {
    return `<div class="view">
      <div class="nav"><span class="nav-logo">Dashboard</span><button class="nav-add" onclick="navigate('upload')">${iconPlus()} New Outfit</button></div>
      <div class="empty"><div class="empty-icon">📊</div><h2>No Data Yet</h2><p>Log a few outfits to see your style stats come to life.</p></div>
    </div>`;
  }

  // ── Style Trends (avg-of-group-averages, WFH excluded) ────
  const sortedAll = [...S.entries].sort((a,b)=>new Date(a.createdAt)-new Date(b.createdAt));
  const avgRating = styleScore(S.entries) || '—';
  const totalWears = S.wardrobe.reduce((s,w)=>s+(w.wears?.length||0),0);
  const totalVal = S.entries.reduce((s,e)=>s+e.items.reduce((ss,i)=>ss+(parseFloat(i.price)||0),0),0);
  const totalItems = S.entries.reduce((s,e)=>s+e.items.length,0);

  // ── Logging Calendar (week strip) ────────────────────────
  function buildCalendar() {
    const offset = S.dashCalOffset || 0; // week offset; 0 = current week
    const today = new Date(); today.setHours(0,0,0,0);
    const toKey = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const todayKey = toKey(today);

    // Sunday of the week we're viewing
    const weekStart = new Date(today);
    weekStart.setDate(today.getDate() - today.getDay() + offset * 7);
    const weekEnd = new Date(weekStart); weekEnd.setDate(weekStart.getDate() + 6);

    // Week label e.g. "May 25 – 31" or "May 26 – Jun 1"
    const fmtShort = d => d.toLocaleDateString('en-US', {month:'short', day:'numeric'});
    const weekLabel = (() => {
      const s = fmtShort(weekStart), e = fmtShort(weekEnd);
      const yr = weekEnd.getFullYear() !== new Date().getFullYear() ? ` ${weekEnd.getFullYear()}` : '';
      return `${s} – ${e}${yr}`;
    })();

    // Group entries by day
    const byDay = {};
    S.entries.forEach(e => {
      const k = toKey(new Date(e.createdAt));
      if (!byDay[k]) byDay[k] = [];
      byDay[k].push(e);
    });

    // Streak
    let streak = 0;
    const si = byDay[todayKey] ? 0 : 1;
    for (let i = si; i < 365; i++) {
      const d = new Date(today); d.setDate(d.getDate() - i);
      if (byDay[toKey(d)]) streak++; else break;
    }

    const dowLabels = ['Su','Mo','Tu','We','Th','Fr','Sa'];
    const cells = Array.from({length:7}, (_, i) => {
      const day = new Date(weekStart); day.setDate(weekStart.getDate() + i);
      const isFuture = day > today;
      const isToday  = toKey(day) === todayKey;
      const key = toKey(day);
      const dayEntries = byDay[key] || [];
      const phase = cyclePhaseForDate(day);
      const phaseBar = phase ? `<div class="cal-wc-phase ${CYCLE_PHASES[phase].cls}"></div>` : '';
      const todayCls = isToday ? ' cal-today' : '';
      const futureCls = isFuture ? ' cal-future' : '';
      if (dayEntries.length) {
        const best = dayEntries.reduce((b,e)=>e.rating>b.rating?e:b, dayEntries[0]);
        const rCls = best.rating >= 8 ? 'r-high' : best.rating >= 6 ? 'r-mid' : 'r-low';
        return `<div class="cal-wc logged ${rCls}${todayCls}" onclick="openEntry('${best.id}')">
          <div class="cal-wc-dow">${dowLabels[i]}</div>
          <div class="cal-wc-date">${day.getDate()}</div>
          <div class="cal-wc-score">${best.rating}</div>
          ${phaseBar}
        </div>`;
      } else {
        return `<div class="cal-wc${futureCls}${todayCls}">
          <div class="cal-wc-dow">${dowLabels[i]}</div>
          <div class="cal-wc-date" style="color:var(--text-3);">${day.getDate()}</div>
          <div class="cal-wc-empty">—</div>
          ${phaseBar}
        </div>`;
      }
    }).join('');

    const streakTxt = streak > 0
      ? `🔥 ${streak}-day streak <span>— keep it up!</span>`
      : `📅 No streak yet <span>— log today's outfit to start!</span>`;

    const todayPhase = S.cycleEnabled ? cyclePhaseForDate(new Date()) : null;
    const phaseCallout = todayPhase ? (() => {
      const p = CYCLE_PHASES[todayPhase];
      return `<div style="display:flex;align-items:center;gap:6px;margin-top:6px;">
        <span class="cycle-phase-swatch ${p.sw}" style="width:8px;height:8px;border-radius:2px;flex-shrink:0;"></span>
        <span style="font-size:11px;color:var(--text-3);"><strong style="color:var(--text-2);">${p.label} phase</strong> — ${p.tip}</span>
      </div>`;
    })() : '';

    return `
      <div class="cal-header">
        <button class="cal-nav-btn" onclick="S.dashCalOffset=(S.dashCalOffset||0)-1;render()">‹</button>
        <span class="cal-month-name">${weekLabel}</span>
        <button class="cal-nav-btn" onclick="S.dashCalOffset=Math.min(0,(S.dashCalOffset||0)+1);render()"${offset>=0?' disabled':''}>›</button>
      </div>
      <div class="cal-streak">${streakTxt}</div>
      <div class="cal-week-row">${cells}</div>
      <div class="cal-legend" style="margin-top:8px;">
        <span class="cal-leg-item"><span class="cal-leg-dot r-high"></span>8+</span>
        <span class="cal-leg-item"><span class="cal-leg-dot r-mid"></span>6–7</span>
        <span class="cal-leg-item"><span class="cal-leg-dot r-low"></span>≤5</span>
      </div>
      ${phaseCallout}`;
  }

  // ── Most Worn ─────────────────────────────────────────────
  const mostWorn = [...S.wardrobe]
    .filter(w=>(w.wears?.length||0)>0)
    .sort((a,b)=>b.wears.length-a.wears.length)
    .slice(0,5);

  // ── Hidden Gems (paid for, barely worn, not flagged as paid-off) ─
  const gems = S.wardrobe
    .filter(w=>w.price && !w.paidOff && (w.wears?.length||0)<3)
    .sort((a,b)=>b.price-a.price)
    .slice(0,4);

  // ── Top Brands ────────────────────────────────────────────
  const brandCounts = {};
  S.wardrobe.forEach(w=>{ if(w.brand) brandCounts[w.brand]=(brandCounts[w.brand]||0)+(w.wears?.length||1); });
  const topBrands = Object.entries(brandCounts).sort((a,b)=>b[1]-a[1]).slice(0,5);

  // ── Retiring Soon (old flag, kept for backward compat) ────
  const retiring = S.wardrobe.filter(w=>w.retiring && !w.retiredFromCloset).slice(0,5);

  // ── Needs Tailoring ───────────────────────────────────────
  const needsTailoring = S.wardrobe.filter(w=>w.tailoringNeeded && !w.retiredFromCloset).slice(0,5);

  // ── Wasted Spend (retired because "didn't suit me") ───────
  const wastedItems = S.wardrobe.filter(w=>w.retiredFromCloset && w.retireReason==='didnt-suit-me' && w.price);
  const wastedTotal = wastedItems.reduce((sum,w)=>sum+parseFloat(w.price||0),0);

  // ── Occasion Breakdown ────────────────────────────────────
  const tagCounts = {};
  S.entries.forEach(e=>{ if(e.occasionTag) tagCounts[e.occasionTag]=(tagCounts[e.occasionTag]||0)+1; });
  const topTags = Object.entries(tagCounts).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const maxTagCount = topTags[0]?.[1]||1;

  // Helper: collapsible section
  function dashSection(key, titleHTML, contentHTML, extraCardStyle='') {
    const open = !!S.dashExpanded[key];
    return `<div class="dash-section">
      <div class="dash-card" style="${extraCardStyle}">
        <button class="dash-section-hdr ${open?'open':''}" onclick="S.dashExpanded['${key}']=!S.dashExpanded['${key}'];render()">
          <div class="dash-section-title">${titleHTML}</div>
          <span class="dash-chevron">▶</span>
        </button>
        ${open ? `<div class="dash-section-body">${contentHTML}</div>` : ''}
      </div>
    </div>`;
  }

  return `<div class="view">
    <div class="nav"><span class="nav-logo">Dashboard</span><button class="nav-add" onclick="navigate('upload')">${iconPlus()} New Outfit</button></div>

    <div class="dash-stats-row">
      <div class="dash-stat"><div class="dash-stat-val">${avgRating}</div><div class="dash-stat-lbl">Style Score</div></div>
      <div class="dash-stat"><div class="dash-stat-val">${S.entries.length}</div><div class="dash-stat-lbl">Outfits</div></div>
      <div class="dash-stat"><div class="dash-stat-val">${totalWears}</div><div class="dash-stat-lbl">Total Wears</div></div>
    </div>

    ${dashSection('calendar', '📅 Logging Calendar', buildCalendar())}

    ${topBrands.length ? dashSection('brands', '🏷 Top Brands',
      topBrands.map(([brand,count])=>`
        <div class="dash-bar-row">
          <div class="dash-bar-label" style="min-width:90px;">${esc(brand)}</div>
          <div class="dash-bar-wrap"><div class="dash-bar-fill" style="width:${Math.round((count/topBrands[0][1])*100)}%"></div></div>
          <div class="dash-bar-count">${count} wear${count===1?'':'s'}</div>
        </div>`).join('')) : ''}

    ${topTags.length ? dashSection('occasions', '🎭 Top Activities',
      topTags.map(([tag,count])=>`
        <div class="dash-bar-row">
          <div class="dash-bar-label">${esc(tag)}</div>
          <div class="dash-bar-wrap"><div class="dash-bar-fill" style="width:${Math.round((count/maxTagCount)*100)}%"></div></div>
          <div class="dash-bar-count">${count}</div>
        </div>`).join('')) : ''}

    ${mostWorn.length ? dashSection('worn', '🔥 Most Worn',
      mostWorn.map((w,i)=>`
        <div class="dash-item-row" onclick="openWardrobeItem('${w.id}')">
          <div class="dash-rank">${i+1}</div>
          <div class="wardrobe-icon" style="width:40px;height:40px;font-size:20px;border-radius:10px;">${w.icon||'👕'}</div>
          <div class="dash-item-info">
            <div class="dash-item-name">${esc(w.name)}</div>
            <div class="dash-item-sub">${w.wears.length} wear${w.wears.length===1?'':'s'}${w.price&&w.wears.length?` · $${(w.price/w.wears.length).toFixed(2)}/wear`:''}</div>
          </div>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text-3)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
        </div>`).join('')) : ''}

    ${gems.length ? dashSection('gems', '💎 Hidden Gems — Wear These More!',
      gems.map(w=>`
        <div class="dash-item-row" onclick="openWardrobeItem('${w.id}')">
          <div class="wardrobe-icon" style="width:40px;height:40px;font-size:20px;border-radius:10px;">${w.icon||'👕'}</div>
          <div class="dash-item-info">
            <div class="dash-item-name">${esc(w.name)}</div>
            <div class="dash-item-sub">$${parseFloat(w.price).toFixed(0)} paid · worn ${w.wears?.length||0}×${w.price&&(w.wears?.length||0)>0?` · $${(w.price/(w.wears?.length||1)).toFixed(2)}/wear`:''}</div>
          </div>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text-3)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
        </div>`).join('')) : ''}

    ${retiring.length ? dashSection('retiring', '🪡 Time to Find a Replacement',
      retiring.map(w=>`
        <div class="dash-item-row" onclick="openWardrobeItem('${w.id}')">
          <div class="wardrobe-icon" style="width:40px;height:40px;font-size:20px;border-radius:10px;opacity:0.72;">${w.icon||'👕'}</div>
          <div class="dash-item-info">
            <div class="dash-item-name">${esc(w.name)}</div>
            <div class="dash-item-sub">${w.brand?esc(w.brand)+' · ':''}${w.wears?.length||0} wear${(w.wears?.length||0)===1?'':'s'} total</div>
          </div>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text-3)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
        </div>`).join(''),
      'border-color:#E8C060;background:repeating-linear-gradient(135deg,#FFFDF5,#FFFDF5 10px,#FEF9EC 10px,#FEF9EC 12px);') : ''}

    ${needsTailoring.length ? dashSection('tailoring', '🧵 Needs Tailoring',
      needsTailoring.map(w=>`
        <div class="dash-item-row" onclick="openWardrobeItem('${w.id}')">
          <div class="wardrobe-icon" style="width:40px;height:40px;font-size:20px;border-radius:10px;">${w.icon||'👕'}</div>
          <div class="dash-item-info">
            <div class="dash-item-name">${esc(w.name)}</div>
            <div class="dash-item-sub">${w.tailoringNote ? esc(w.tailoringNote) : (w.brand?esc(w.brand)+' · ':'')+'needs alteration'}</div>
          </div>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text-3)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
        </div>`).join(''),
      'border-color:#C8A8E0;') : ''}

    ${wastedItems.length ? dashSection('wasted', `💸 Didn't Suit Me — $${wastedTotal % 1 === 0 ? wastedTotal : wastedTotal.toFixed(0)} Spent`,
      `<p style="font-size:13px;color:var(--text-2);line-height:1.6;margin-bottom:10px;">These pieces were retired because they didn't work out. Tracking this helps you shop smarter next time.</p>` +
      wastedItems.map(w=>`
        <div class="dash-item-row" onclick="openWardrobeItem('${w.id}')">
          <div class="wardrobe-icon" style="width:40px;height:40px;font-size:20px;border-radius:10px;opacity:0.55;">${w.icon||'👕'}</div>
          <div class="dash-item-info">
            <div class="dash-item-name">${esc(w.name)}</div>
            <div class="dash-item-sub">$${parseFloat(w.price).toFixed(0)} · ${w.wears?.length||0} wear${(w.wears?.length||0)===1?'':'s'} · ${w.retireOutcome||'retired'}</div>
          </div>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text-3)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
        </div>`).join(''),
      'border-color:#C8A8E0;') : ''}

    <div style="height:8px"></div>
  </div>`;
}

/* ================================================================
   VIEW: WARDROBE
   ================================================================ */
function viewWardrobe() {
  // Separate retired items from active wardrobe
  const activeWardrobe = S.wardrobe.filter(w => !w.retiredFromCloset);
  const retiredWardrobe = S.wardrobe.filter(w => w.retiredFromCloset);
  let items = [...activeWardrobe];

  // Count items per category (across active wardrobe items only, before any filter)
  const catCounts = {};
  WARDROBE_CATEGORIES.forEach(c => catCounts[c] = 0);
  catCounts['All'] = activeWardrobe.length;
  activeWardrobe.forEach(w => {
    const cat = normalizeCat(w.category || categoryFromIcon(w.icon, w.name));
    if (catCounts[cat] !== undefined) catCounts[cat]++;
  });

  // Apply category filter
  if (S.wardrobeCategory !== 'All') {
    items = items.filter(w => normalizeCat(w.category || categoryFromIcon(w.icon, w.name)) === S.wardrobeCategory);
  }

  // Apply sub-category filter
  if (S.wardrobeCategory !== 'All' && S.wardrobeSubCategory !== 'All') {
    items = items.filter(w => {
      const cat = normalizeCat(w.category || categoryFromIcon(w.icon, w.name));
      const sub = w.subCategory || subCategoryFromName(w.name, cat);
      return sub === S.wardrobeSubCategory;
    });
  }

  // Sort
  if (S.wardrobeSort === 'most-worn') items.sort((a,b) => b.wears.length - a.wears.length);
  if (S.wardrobeSort === 'best-val')  items.sort((a,b) => {
    const ppwA = a.price && a.wears.length ? a.price/a.wears.length : Infinity;
    const ppwB = b.price && b.wears.length ? b.price/b.wears.length : Infinity;
    return ppwA - ppwB;
  });
  if (S.wardrobeSort === 'az') items.sort((a,b) => a.name.localeCompare(b.name));

  // Category chips — always show all categories, with count badges
  const catBar = S.wardrobe.length > 0 ? `
    <div class="filter-bar-wrap at-start" id="fbw-wcat">
    <div class="filter-bar">
      ${WARDROBE_CATEGORIES.map(c => {
        const count = catCounts[c] || 0;
        const empty = c !== 'All' && count === 0;
        const badge = c !== 'All' ? `<span class="cat-count-badge">${count}</span>` : '';
        return `<div class="filter-chip ${S.wardrobeCategory===c?'active':''} ${empty?'filter-chip-empty':''}"
          onclick="S.wardrobeCategory='${c}';S.wardrobeSubCategory='All';S.wardrobeExpanded=false;render()">${c}${badge}</div>`;
      }).join('')}
    </div></div>` : '';

  // Sub-category chips — only when a non-All category is selected
  const subCats = S.wardrobeCategory !== 'All' ? WARDROBE_SUBCATEGORIES[S.wardrobeCategory] || [] : [];
  const subCatBar = subCats.length > 1 ? `
    <div class="filter-bar-wrap at-start" id="fbw-wsub">
    <div class="filter-bar filter-bar-sub">
      ${subCats.map(s => `<div class="filter-chip filter-chip-sub ${S.wardrobeSubCategory===s?'active':''}"
        onclick="S.wardrobeSubCategory='${s.replace(/'/g,"\\'")}';render()">${s}</div>`).join('')}
    </div></div>` : '';

  const sortBar = S.wardrobe.length > 1 ? `
    <div class="filter-bar-wrap at-start at-end" id="fbw-wsort">
    <div class="filter-bar" style="padding-top:4px;">
      <div class="filter-chip ${S.wardrobeSort==='most-worn'?'active':''}" onclick="S.wardrobeSort='most-worn';render()">Most Worn</div>
      <div class="filter-chip ${S.wardrobeSort==='best-val'?'active':''}"  onclick="S.wardrobeSort='best-val';render()">Best Value</div>
      <div class="filter-chip ${S.wardrobeSort==='az'?'active':''}"        onclick="S.wardrobeSort='az';render()">A–Z</div>
    </div></div>` : '';

  // ── Helper: total cost for a set of items ─────────────────
  const catCost = arr => arr.reduce((s,w) => s + (parseFloat(w.price)||0), 0);
  const fmtCost = v => v > 0 ? `$${v % 1 === 0 ? v : v.toFixed(0)}` : null;

  // ── Empty states ───────────────────────────────────────────
  const emptyMsg = S.wardrobeCategory !== 'All'
    ? `<div class="empty">
        <div class="empty-icon">🔍</div>
        <h2>No ${S.wardrobeCategory} Yet</h2>
        <p>Items in this category will appear here once you log outfits and add them to your wardrobe.</p>
      </div>`
    : `<div class="empty">
        <div class="empty-icon">🧺</div>
        <h2>Wardrobe is Empty</h2>
        <p>After you log an outfit, Claude will offer to add the items to your Wardrobe so you can track wear counts and price per wear.</p>
      </div>`;

  // ── Grid content (rod view) ─────────────────────────────────
  let gridHTML = '';

  if (!items.length) {
    gridHTML = emptyMsg;

  } else if (S.wardrobeCategory !== 'All') {
    // Filtered: single rod for the active category
    const cost = catCost(items);
    const costStr = fmtCost(cost);
    gridHTML = `<div class="rod-section">
      <div class="rod-section-header">
        <span class="rod-section-cat">${S.wardrobeCategory}</span>
        <span class="rod-section-meta">${items.length} item${items.length===1?'':'s'}${costStr?' · '+costStr:''}</span>
      </div>
      <div class="rod-track">
        <div class="rod-items-inner">
          ${items.map(hangerHTML).join('')}
        </div>
      </div>
    </div>`;

  } else {
    // All — one rod per populated category
    const CATEGORY_ORDER = ['Tops','Jackets','Pants','Dresses','Shoes','Bags','Jewelry','Other','Accessories'];
    const grouped = {};
    CATEGORY_ORDER.forEach(c => grouped[c] = []);
    const uncategorized = [];
    items.forEach(w => {
      const cat = normalizeCat(w.category || categoryFromIcon(w.icon, w.name));
      if (grouped[cat] !== undefined) grouped[cat].push(w);
      else uncategorized.push(w);
    });

    let sections = '';
    CATEGORY_ORDER.forEach(cat => {
      const catItems = grouped[cat];
      if (!catItems.length) return;
      const cost = catCost(catItems);
      const costStr = fmtCost(cost);
      sections += `<div class="rod-section">
        <div class="rod-section-header">
          <span class="rod-section-cat">${cat}</span>
          <span class="rod-section-meta">${catItems.length} item${catItems.length===1?'':'s'}${costStr?' · '+costStr:''}</span>
        </div>
        <div class="rod-track">
          <div class="rod-items-inner">
            ${catItems.map(hangerHTML).join('')}
          </div>
        </div>
      </div>`;
    });

    if (uncategorized.length) {
      sections += `<div class="rod-section">
        <div class="rod-section-header">
          <span class="rod-section-cat">Other</span>
          <span class="rod-section-meta">${uncategorized.length} item${uncategorized.length===1?'':'s'}</span>
        </div>
        <div class="rod-track">
          <div class="rod-items-inner">
            ${uncategorized.map(hangerHTML).join('')}
          </div>
        </div>
      </div>`;
    }

    const totalCost = catCost(items);
    const totalStr = fmtCost(totalCost);
    const totalBar = totalStr ? `
      <div class="wg-total-bar">
        <span class="wg-total-label">Total wardrobe value</span>
        <span class="wg-total-value">${totalStr}</span>
      </div>` : '';

    gridHTML = sections + totalBar;
  }

  // ── Retired items section ─────────────────────────────────
  const retiredSectionHTML = retiredWardrobe.length ? (() => {
    const isOpen = !!S.wardrobeRetiredExpanded;
    const wastedSpend = retiredWardrobe
      .filter(w => w.retireReason === 'didnt-suit-me' && w.price)
      .reduce((sum, w) => sum + parseFloat(w.price || 0), 0);
    const memorialCount = retiredWardrobe.filter(w => w.memorial).length;
    return `<div style="margin:4px 16px 8px;">
      ${memorialCount > 0 ? `<button onclick="navigate('rip')" style="
        width:100%;display:flex;align-items:center;justify-content:center;gap:8px;
        background:linear-gradient(135deg,#16121A 0%,#1D1825 100%);
        border:1px solid rgba(150,80,220,0.28);border-radius:var(--r);
        padding:11px 16px;cursor:pointer;font-family:inherit;margin-bottom:8px;
      ">
        <span style="font-size:15px;">🌹</span>
        <span style="font-size:13px;font-weight:600;color:rgba(160,100,240,0.9);">Memorial Garden (${memorialCount})</span>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(160,100,240,0.6)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
      </button>` : ''}
      <button onclick="S.wardrobeRetiredExpanded=!S.wardrobeRetiredExpanded;render()" style="
        width:100%;display:flex;align-items:center;justify-content:space-between;gap:8px;
        background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
        padding:12px 16px;cursor:pointer;font-family:inherit;
        ${isOpen ? 'border-radius:var(--r) var(--r) 0 0;border-bottom-color:var(--border);' : ''}
      ">
        <span style="font-weight:600;font-size:13px;color:var(--text-2);">📦 Retired (${retiredWardrobe.length})</span>
        <div style="display:flex;align-items:center;gap:10px;">
          ${wastedSpend > 0 ? `<span style="font-size:12px;color:#9B60C8;">$${wastedSpend % 1 === 0 ? wastedSpend : wastedSpend.toFixed(0)} didn't suit</span>` : ''}
          <span style="font-size:12px;color:var(--text-3);transform:${isOpen?'rotate(90deg)':'none'};transition:transform .15s;">▶</span>
        </div>
      </button>
      ${isOpen ? `<div style="background:var(--surface);border:1px solid var(--border);border-top:none;border-radius:0 0 var(--r) var(--r);overflow:hidden;">
        <div class="wardrobe-grid">
          ${retiredWardrobe.map(w => {
            const wears = w.wears?.length || 0;
            const outcomeLabel = {donated:'Donated',sold:'Sold',tossed:'Tossed'}[w.retireOutcome] || '';
            const reasonLabel = {'worn-out':'Worn out','didnt-suit-me':"Didn't suit me"}[w.retireReason] || '';
            const stripeColor = colorFromItemName(w.name);
            const stripeEl = `<div class="wgc-stripe" style="background:${stripeColor||'var(--border)'};opacity:${stripeColor?'1':'0'};"></div>`;
            const meta = [outcomeLabel, reasonLabel].filter(Boolean).join(' · ');
            return `<div class="wardrobe-grid-cell wgc-retired" onclick="openWardrobeItem('${w.id}')">
              ${stripeEl}
              <div class="wgc-info">
                <div class="wgc-name">${esc(w.name)}</div>
                ${meta ? `<div class="wgc-meta">${meta}</div>` : ''}
              </div>
              <div class="wgc-right">
                <span class="wgc-wear">${wears} wear${wears===1?'':'s'}</span>
              </div>
            </div>`;
          }).join('')}
        </div>
      </div>` : ''}
    </div>`;
  })() : '';

  return `<div class="view">
    <div class="nav">
      <span class="nav-logo">${S.profileName.trim() ? `${S.profileName.trim()}'s Closet` : 'My Closet'}</span>
      <span style="display:inline-flex;gap:6px;align-items:center;">
        <button onclick="S.receiptFlow={step:'input',imageData:'',imageMime:'',pasteText:'',preview:null};navigate('receipt-add')" title="Add from receipt" style="background:none;border:1.5px solid var(--border);border-radius:9px;padding:6px 10px;font-size:15px;cursor:pointer;line-height:1;color:var(--text-2);">📧</button>
        <button class="nav-add" onclick="navigate('upload')">${iconPlus()} New Outfit</button>
      </span>
    </div>
    <div class="tab-headline">Know what you own. Love what you wear.</div>
    ${activeWardrobe.length > 0 ? `<div style="padding:10px 16px 0;display:flex;align-items:baseline;gap:6px;">
      <span style="font-size:28px;font-weight:900;color:var(--text);letter-spacing:-.5px;">${activeWardrobe.length}</span>
      <span style="font-size:12px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em;">piece${activeWardrobe.length===1?'':'s'} in your closet</span>
    </div>` : ''}
    ${catBar}${subCatBar}${sortBar}${gridHTML}
    ${retiredSectionHTML}
    <div style="height:8px"></div>
  </div>`;
}

function wardrobeGridCellHTML(w) {
  const wears = w.wears?.length || 0;
  const cat = normalizeCat(w.category || categoryFromIcon(w.icon, w.name));
  const sub = w.subCategory || subCategoryFromName(w.name, cat);
  const metaParts = [];
  if (w.brand) metaParts.push(esc(w.brand));
  if (sub && sub !== cat) metaParts.push(sub);
  if (w.paidOff) metaParts.push('Paid off');
  else if (w.price && wears > 0) metaParts.push('$'+(w.price/wears).toFixed(2)+'/wear');
  const complimentCount = w.compliments?.length || 0;
  if (complimentCount > 0) metaParts.push(`✦ ${complimentCount} compliment${complimentCount===1?'':'s'}`);
  if (w.tailoringNeeded) metaParts.push(`🧵 Needs tailoring`);
  if (w.gifted) metaParts.push(w.giftedBy ? `💝 Gift from ${esc(w.giftedBy)}` : '💝 Gifted');
  const stripeColor = colorFromItemName(w.name);
  const stripeEl = `<div class="wgc-stripe" style="background:${stripeColor || 'var(--border)'};opacity:${stripeColor ? '1' : '0'};"></div>`;
  const cellClass = w.retiredFromCloset ? ' wgc-retired' : (w.retiring ? ' retiring' : '');
  return `<div class="wardrobe-grid-cell${cellClass}" onclick="openWardrobeItem('${w.id}')">
    ${stripeEl}
    <div class="wgc-info">
      <div class="wgc-name">${esc(w.name)}</div>
      ${metaParts.length ? `<div class="wgc-meta">${metaParts.join(' · ')}</div>` : ''}
    </div>
    <div class="wgc-right">
      <span class="wgc-wear">${wears} wear${wears===1?'':'s'}</span>
      <button class="wgc-edit-btn" title="Rename" onclick="event.stopPropagation();quickRenameItem('${w.id}')">✎</button>
    </div>
  </div>`;
}

function wardrobeCardHTML(w) {
  const wears = w.wears?.length || 0;
  const ppw   = w.price && wears > 0 ? '$'+(w.price/wears).toFixed(2)+'/wear' : null;
  const priceBadge = w.paidOff
    ? `<span class="paid-off-badge">💚 Paid Off</span>`
    : ppw
      ? `<span class="ppw-badge">${ppw}</span>`
      : w.price ? `<span class="ppw-badge" style="background:var(--surface-2);color:var(--text-3);">$${parseFloat(w.price).toFixed(2)}</span>` : '';
  return `<div class="wardrobe-card${w.retiring?' retiring':''}" onclick="openWardrobeItem('${w.id}')">
    <div class="wardrobe-icon">${w.icon||'👕'}</div>
    <div class="wardrobe-info">
      <div class="wardrobe-name">${esc(w.name)}</div>
      ${w.brand ? `<div style="font-size:11px;color:var(--text-3);margin-bottom:4px;font-weight:500;">${esc(w.brand)}</div>` : ''}
      <div class="wardrobe-meta">
        <span class="wear-badge">${iconClock(14)} ${wears} wear${wears===1?'':'s'}</span>
        ${priceBadge}
        ${w.retiring ? `<span class="retiring-chip">🪡 Retiring</span>` : ''}
      </div>
    </div>
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--text-3)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
  </div>`;
}

function hangerHTML(w) {
  const wears = w.wears?.length || 0;
  const stripeColor = colorFromItemName(w.name);
  const stripeEl = stripeColor
    ? `<div class="hanger-color-strip" style="background:${stripeColor};"></div>`
    : '';
  const topArea = w.sketch
    ? `<img src="${esc(w.sketch)}" class="hanger-img" alt="${esc(w.name)}" onerror="this.style.display='none'">`
    : `<div class="hanger-icon">${w.icon || '👕'}</div>`;
  return `<div class="hanger" onclick="openWardrobeItem('${w.id}')">
    <div class="hanger-peg"></div>
    <div class="hanger-card">
      ${stripeEl}
      ${topArea}
      <div class="hanger-name">${esc(w.name)}</div>
      ${w.brand ? `<div class="hanger-brand">${esc(w.brand)}</div>` : ''}
      ${w.size ? `<div class="hanger-brand" style="color:var(--text-2);font-weight:600;">${esc(w.size)}</div>` : ''}
      <div class="hanger-wears">${wears}w</div>
    </div>
  </div>`;
}

/* ================================================================
   VIEW: WARDROBE ITEM DETAIL
   ================================================================ */
function viewWardrobeItem() {
  const w = S.wardrobe.find(i => i.id === S.selectedWardrobeId);
  if (!w) { navigate('wardrobe'); return ''; }
  const wears = w.wears?.length || 0;
  const ppw   = w.price && wears > 0 ? (w.price/wears).toFixed(2) : null;
  const complimentCount = w.compliments?.length || 0;
  const outfits = (w.wears||[]).map(wr => S.entries.find(e => e.id === wr.outfitId)).filter(Boolean);

  // Similar items: same category OR first word of name matches
  const firstName = w.name.toLowerCase().split(/\s+/)[0];
  const similar = S.wardrobe.filter(other =>
    other.id !== w.id && (
      (other.category && other.category === w.category) ||
      other.name.toLowerCase().split(/\s+/)[0] === firstName
    )

          ${iconTrash()}
        </button>
      </div>

    <div class="witem-hero">
      ${w.sketch
        ? `<div class="witem-img-wrap"><img src="${esc(w.sketch)}" class="witem-img" alt="${esc(w.name)}" onerror="this.style.display='none'"></div>`

      ${w.brand ? `<div style="font-size:14px;color:var(--text-3);margin-top:-6px;font-weight:500;">${esc(w.brand)}</div>` : ''}

let cropState = null, _cropCleanup = null;

function viewCrop() {
  if (!S.pendingPhoto) return viewUpload();
  return `<div class="view view-notab">
    <div class="nav">
      <button class="nav-back" onclick="exitCrop()">${iconBack()} Back</button>
      <span class="nav-title">Crop Photo</span>

    </div>
    <p style="font-size:13px;color:var(--text-2);text-align:center;padding:10px 20px 12px;line-height:1.5;">Drag the box to reposition · Drag corners to resize</p>
    <div class="crop-wrap" id="cropWrap">
      <img id="cropImg" class="crop-img-full" src="${S.pendingPhoto}" alt="Crop your photo" draggable="false">
      <div class="crop-box" id="cropBox">
        <div class="crop-rule-v"></div><div class="crop-rule-v"></div>
        <div class="crop-rule-h"></div><div class="crop-rule-h"></div>
        <div class="crop-handle" data-handle="tl"></div>
        <div class="crop-handle" data-handle="tr"></div>
        <div class="crop-handle" data-handle="bl"></div>
        <div class="crop-handle" data-handle="br"></div>
      </div>
    </div>
    <div style="height:20px"></div>
    <button class="btn btn-primary" onclick="applyCrop()">Apply Crop</button>
    <div style="height:10px"></div>
    <button class="btn btn-secondary" onclick="exitCrop()">Use Full Photo</button>
    <div style="height:24px"></div>
  </div>`;
}

function initCrop() {
  const img = document.getElementById('cropImg'), wrap = document.getElementById('cropWrap');
  if (!img || !wrap) return;
  function setup() {
    const cW = wrap.offsetWidth, cH = img.offsetHeight;
    let bW = cW, bH = bW*(4/3);
    if (bH > cH) { bH = cH; bW = bH*(3/4); }
    cropState = { x:Math.round((cW-bW)/2), y:Math.round((cH-bH)/2), w:Math.round(bW), h:Math.round(bH), containerW:cW, containerH:cH, dragging:false, resizing:null };
    updateCropBox();
    setupCropListeners();
  }
  if (img.complete && img.naturalWidth) setup(); else img.onload = setup;
}
function updateCropBox() {
  const box = document.getElementById('cropBox');
  if (!box || !cropState) return;
  box.style.left = cropState.x+'px'; box.style.top  = cropState.y+'px';
  box.style.width= cropState.w+'px'; box.style.height=cropState.h+'px';
}
function setupCropListeners() {
  if (_cropCleanup) _cropCleanup();
  const box = document.getElementById('cropBox'); if (!box) return;
  function wr() { const w=document.getElementById('cropWrap'); return w?w.getBoundingClientRect():{left:0,top:0}; }
  function onDown(e) {
    e.preventDefault();
    const pt=e.touches?e.touches[0]:e, r=wr(), px=pt.clientX-r.left, py=pt.clientY-r.top;
    const hdl=e.target.dataset?.handle;
    if (hdl) { cropState.resizing=hdl; cropState._px0=px; cropState._py0=py; cropState._x0=cropState.x; cropState._y0=cropState.y; cropState._w0=cropState.w; cropState._h0=cropState.h; }
    else { cropState.dragging=true; cropState._ox=px-cropState.x; cropState._oy=py-cropState.y; }
  }
  function onMove(e) {
    if (!cropState||(!cropState.dragging&&!cropState.resizing)) return;
    if (e.cancelable) e.preventDefault();
    const pt=e.touches?e.touches[0]:e, r=wr(), px=pt.clientX-r.left, py=pt.clientY-r.top;
    if (cropState.dragging) {
      cropState.x=Math.round(Math.max(0,Math.min(cropState.containerW-cropState.w, px-cropState._ox)));
      cropState.y=Math.round(Math.max(0,Math.min(cropState.containerH-cropState.h, py-cropState._oy)));
    } else doCropResize(px-cropState._px0, py-cropState._py0);
    updateCropBox();
  }
  function onUp() { if(cropState){cropState.dragging=false;cropState.resizing=null;} }
  box.addEventListener('mousedown',onDown); box.addEventListener('touchstart',onDown,{passive:false});
  document.addEventListener('mousemove',onMove); document.addEventListener('mouseup',onUp);
  document.addEventListener('touchmove',onMove,{passive:false}); document.addEventListener('touchend',onUp);
  _cropCleanup=()=>{
    box.removeEventListener('mousedown',onDown); box.removeEventListener('touchstart',onDown);
    document.removeEventListener('mousemove',onMove); document.removeEventListener('mouseup',onUp);
    document.removeEventListener('touchmove',onMove); document.removeEventListener('touchend',onUp);
    _cropCleanup=null;
  };
}
function doCropResize(dx, dy) {
  const h=cropState.resizing, R=4/3, MIN=80;
  const {_x0:sx,_y0:sy,_w0:sw,_h0:sh}=cropState;
  let nw,nx,ny;
  if (h==='br'){nw=sw+dx;nx=sx;ny=sy;}
  else if(h==='bl'){nw=sw-dx;nx=sx+(sw-nw);ny=sy;}
  else if(h==='tr'){nw=sw+dx;nx=sx;ny=sy+sh-nw*R;}
  else{nw=sw-dx;nx=sx+(sw-nw);ny=sy+sh-nw*R;}
  nw=Math.max(MIN,nw); let nh=nw*R;
  if(nx<0){nw+=nx;nh=nw*R;nx=0;} if(ny<0){ny=0;}
  if(nx+nw>cropState.containerW){nw=cropState.containerW-nx;nh=nw*R;}
  if(ny+nh>cropState.containerH){nh=cropState.containerH-ny;nw=nh/R;}
  cropState.x=Math.round(nx); cropState.y=Math.round(ny);
  cropState.w=Math.round(Math.max(MIN,nw)); cropState.h=Math.round(Math.max(MIN*R,nh));
}
function applyCrop() {
  if (!cropState||!S.pendingPhoto) return;
  const img=document.getElementById('cropImg'), wrap=document.getElementById('cropWrap');
  if (!img||!wrap) return;
  const scaleX=img.naturalWidth/wrap.offsetWidth, scaleY=img.naturalHeight/img.offsetHeight;
  const canvas=document.createElement('canvas');
  canvas.width=Math.round(cropState.w*scaleX); canvas.height=Math.round(cropState.h*scaleY);
  canvas.getContext('2d').drawImage(img, Math.round(cropState.x*scaleX), Math.round(cropState.y*scaleY), canvas.width, canvas.height, 0,0,canvas.width,canvas.height);
  S.pendingPhoto=canvas.toDataURL('image/jpeg',0.85); S.pendingMime='image/jpeg';
  exitCrop();
}
function exitCrop() { if(_cropCleanup)_cropCleanup(); cropState=null; navigate('upload'); }

// Wrapper for replay view — reads from current selected entry
function shareBattleReplay() {
  const entry = S.entries.find(e => e.id === S.selectedId);
  if (!entry?.battleId) return;
  const partner = S.entries.find(e => e.id === entry.battlePartnerId);
  if (!partner) return;
  const isTie = !entry.battleWon && !partner.battleWon;
  const winner   = entry.battleWon ? entry   : partner;
  const runnerUp = entry.battleWon ? partner : entry;
  shareBattleResult({
    photo:   entry.photo,
    label1:  winner.battleLabel   || 'Winner',
    label2:  runnerUp.battleLabel || 'Runner-up',
    rating1: winner.rating,
    rating2: runnerUp.rating,
    winner:  isTie ? 0 : 1,
    verdict: entry.battleVerdict || '',
  });
}
// Wrapper for live battle draft view
function shareBattleDraft() {
  const bd = S.battleDraft; if (!bd) return;
  shareBattleResult({
    photo:   bd.photo,
    label1:  bd.person1.label || 'Person 1',
    label2:  bd.person2.label || 'Person 2',
    rating1: bd.person1.rating,
    rating2: bd.person2.rating,
    winner:  bd.winner,
    verdict: bd.verdict || '',
  });
}
async function shareBattleResult({ photo, label1, label2, rating1, rating2, winner, verdict }) {
  const winnerLabel = winner === 1 ? label1 : winner === 2 ? label2 : null;
  const winLine = winnerLabel ? `👑 ${winnerLabel} takes the crown` : "🤝 It's a tie!";
  const scoreText = `${label1} ${rating1}/10  ·  ${label2} ${rating2}/10`;
  const shareText = `⚔️ Fashion Battle\n${winLine}\n${scoreText}\n\nClaude's verdict: "${verdict}"\n\nvia Closet 🪞`;

  // Build a composite share card on canvas
  try {
    const W = 800, PHOTO_H = 520, CARD_H = 320, H = PHOTO_H + CARD_H;
    const canvas = document.createElement('canvas');
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext('2d');

    // Background
    ctx.fillStyle = '#1C1A18';
    ctx.fillRect(0, 0, W, H);

    // Photo (top portion, object-fit:cover)
    await new Promise((res, rej) => {
      const img = new Image();
      img.onload = () => {
        const srcAspect = img.naturalWidth / img.naturalHeight;
        const dstAspect = W / PHOTO_H;
        let sx = 0, sy = 0, sw = img.naturalWidth, sh = img.naturalHeight;
        if (srcAspect > dstAspect) { sw = Math.round(sh * dstAspect); sx = Math.round((img.naturalWidth - sw) / 2); }
        else                       { sh = Math.round(sw / dstAspect); }
        ctx.drawImage(img, sx, sy, sw, sh, 0, 0, W, PHOTO_H);
        res();
      };
      img.onerror = rej;
      img.src = photo;
    });

    // Gradient fade photo → card
    const grad = ctx.createLinearGradient(0, PHOTO_H - 100, 0, PHOTO_H);
    grad.addColorStop(0, 'rgba(28,26,24,0)');
    grad.addColorStop(1, 'rgba(28,26,24,1)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, PHOTO_H - 100, W, 100);

    // ── Text card ────────────────────────────────────────
    ctx.textAlign = 'center';

    // Gold title
    let y = PHOTO_H + 30;
    ctx.fillStyle = '#C9A84C';
    ctx.font = 'bold 30px -apple-system, system-ui, sans-serif';
    ctx.fillText('⚔️ Fashion Battle', W / 2, y); y += 46;

    // Winner line
    ctx.fillStyle = '#F5F0E8';
    ctx.font = 'bold 22px -apple-system, system-ui, sans-serif';
    ctx.fillText(winLine, W / 2, y); y += 34;

    // Scores
    ctx.fillStyle = '#A89880';
    ctx.font = '17px -apple-system, system-ui, sans-serif';
    ctx.fillText(scoreText, W / 2, y); y += 30;

    // Divider
    ctx.strokeStyle = '#3A3530'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(60, y); ctx.lineTo(W - 60, y); ctx.stroke(); y += 24;

    // Verdict (word-wrapped)
    ctx.fillStyle = '#C8B99A';
    ctx.font = 'italic 15px Georgia, serif';
    const maxLineW = W - 100;
    const words = `"${verdict}"`.split(' ');
    let line = '';
    for (const word of words) {
      const test = line ? line + ' ' + word : word;
      if (ctx.measureText(test).width > maxLineW && line) {
        ctx.fillText(line, W / 2, y); y += 23; line = word;
      } else { line = test; }
    }
    if (line) { ctx.fillText(line, W / 2, y); y += 23; }

    // Watermark
    y += 10;
    ctx.fillStyle = '#4A4540';
    ctx.font = '12px -apple-system, system-ui, sans-serif';
    ctx.fillText('🪞 Closet', W / 2, y);

    // Share or download
    const blob = await new Promise(res => canvas.toBlob(res, 'image/png'));
    const file = new File([blob], 'fashion-battle.png', { type: 'image/png' });

    if (navigator.share && navigator.canShare?.({ files: [file] })) {
      await navigator.share({ files: [file], title: '⚔️ Fashion Battle', text: winLine });
    } else if (navigator.share) {
      await navigator.share({ title: '⚔️ Fashion Battle', text: shareText });
    } else {
      // Fallback: download image
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'fashion-battle.png';
      a.click();
      setTimeout(() => URL.revokeObjectURL(a.href), 5000);
      toast('Battle card saved — share away! 📤');
    }
  } catch (e) {
    console.error('shareBattleResult:', e);
    // Last resort: clipboard
    try { await navigator.clipboard.writeText(shareText); toast('Copied to clipboard!'); }
    catch { toast('Share not supported on this browser'); }
  }
}

async function doSaveBattle() {
  const bd = S.battleDraft; if (!bd) return;
  Object.assign(S, { loading:true, loadingMsg:'Saving both outfits…' }); render();

  const battleId = uid();
  const now = new Date().toISOString();
  const id1 = uid(), id2 = uid();

  function makeEntry(p, id, partnerId, won) {
    return {
      id, createdAt: now, photo: bd.photo,
      items: (p.items||[]).map(it=>({ id:uid(), name:it.name||'', description:it.description||'', icon:it.icon||'👕', price:null })),
      rating: p.rating||7, ratingNote: p.ratingNote||'',
      recommendations: p.recommendations||[],
      shopQueries: p.shopQueries||[],
      notes:'', timesWorn:0,
      battleId, battlePartnerId: partnerId,
      battleLabel: p.label||'', battleWon: won,
      battleVerdict: bd.verdict||'',
    };
  }

  const entry1 = makeEntry(bd.person1, id1, id2, bd.winner === 1);
  const entry2 = makeEntry(bd.person2, id2, id1, bd.winner === 2);

  try {
    // Run tagging + shopping in parallel for both entries
    const [tag1, tag2, shop1, shop2] = await Promise.all([
      tagOccasion(''), tagOccasion(''),
      fetchShopResults(entry1.shopQueries),
      fetchShopResults(entry2.shopQueries),
    ]);
    if (shop1?.length) entry1.shopResults = shop1;
    if (shop2?.length) entry2.shopResults = shop2;

    await DB.entries.put(entry1);
    await DB.entries.put(entry2);
    S.entries = await DB.entries.getAll();
    S.selectedId = entry1.id;
    S.battleDraft = null;
    clearPending();
    Object.assign(S, { loading:false }); navigate('detail');
    toast('⚔️ Battle saved! Both outfits are in your Closet.');
  } catch(err) {
    Object.assign(S, { loading:false, error:err.message }); render();
  }
}

      <div style="height:16px"></div>` : ''}

    ${!mr.matches.length && !mr.unmatched.length ? `

    <button class="btn btn-primary" onclick="doConfirmMatchReview()">${btnLabel}</button>

  // Find wardrobe items linked to this outfit (logged via wear records on confirm)
  const wornInOutfit = S.wardrobe.filter(w => w.wears?.some(wr => wr.outfitId === entry.id));
  function findWardrobeMatch(outfitItem) {
    const name = (outfitItem.name || '').toLowerCase().trim();
    // Exact name match first
    let m = wornInOutfit.find(w => w.name.toLowerCase().trim() === name);
    if (m) return m;
    // Partial name match (one contains the other)
    m = wornInOutfit.find(w => {
      const wn = w.name.toLowerCase().trim();
      return wn.length > 2 && name.length > 2 && (wn.includes(name) || name.includes(wn));
    });
    return m || null;
  }

  // Total outfit cost: sum prices from wardrobe-linked items (source of truth)
  const totalCost = entry.items.reduce((s,it) => {
    const wm = findWardrobeMatch(it);
    return s + (wm ? (parseFloat(wm.price)||0) : 0);
  }, 0);
  const ppw = entry.timesWorn>0&&totalCost>0 ? (totalCost/entry.timesWorn).toFixed(2) : null;

  return `<div class="view view-notab">
    <div class="nav">
      <button class="nav-back" onclick="navigate(S.activeTab)">${iconBack()} ${S.activeTab==='closet'?'Fits':'Back'}</button>
      <span class="nav-title"></span>
      <div style="width:72px"></div>
    </div>
    <img class="detail-photo" src="${entry.photo}" alt="Outfit">
    <div class="detail-body">
      ${entry.battleId ? `
      <div class="battle-partner-bar">
        <div style="flex:1;">
          <div style="font-size:11px;font-weight:700;letter-spacing:.06em;color:var(--gold-dk);margin-bottom:2px;">${entry.battleWon ? '🏆 WINNER' : '🥈 RUNNER UP'}</div>
          <div style="font-size:13px;font-weight:700;color:var(--text);">${esc(entry.battleLabel||'This Outfit')}</div>
        </div>
        <div style="display:flex;gap:6px;flex-shrink:0;">
          <button onclick="navigate('battle-replay')" style="background:var(--gold);border:none;border-radius:100px;padding:7px 14px;font-size:12px;font-weight:700;color:#fff;cursor:pointer;font-family:inherit;">⚔️ Replay</button>
          <button onclick="openEntry('${entry.battlePartnerId}')" style="background:var(--surface);border:1px solid var(--border);border-radius:100px;padding:7px 14px;font-size:12px;font-weight:700;color:var(--text);cursor:pointer;font-family:inherit;">Other →</button>
        </div>
      </div>` : ''}
      <div class="detail-header">
        <div>
          <div class="detail-date">${fmtDateLong(entry.createdAt)}</div>
          ${entry.occasionTag ? `<div class="occasion-tag" style="margin-bottom:8px;">${entry.occasionTag===WFH_TAG?'🏠':'🏷'} ${esc(entry.occasionTag)}</div>` : ''}
          ${isWFH(entry) ? `<div style="font-size:12px;color:var(--text-3);margin-bottom:6px;">🙈 Comfort first — not counted in your style score</div>` : ''}
          ${entry.weather ? `<div class="weather-chip" style="margin-bottom:8px;">${entry.weather.icon} ${entry.weather.tempF}°F · ${esc(entry.weather.condition)}</div>` : ''}
          <div class="rating-big"><span class="rating-num">${entry.rating}</span><span class="rating-denom">/10</span></div>
        </div>
        <button class="worn-btn" onclick="logWear('${entry.id}')">${iconClock(14)} Worn ${entry.timesWorn||0}×</button>
      </div>
      ${entry.ratingNote?`<p class="rating-note">"${esc(entry.ratingNote)}"</p>`:''}

      ${entry.weather ? `
      <div class="feel-bar">
        <div class="feel-bar-title">How did you feel in this outfit?</div>
        <div style="font-size:12px;color:var(--text-3);margin-top:-6px;margin-bottom:2px;">Worn at ${entry.weather.tempF}°F · ${esc(entry.weather.condition)}</div>
        <div class="feel-btns">
          <button class="feel-btn ${entry.weatherFeel==='cold'?'sel-cold':''}" onclick="setWeatherFeel('${entry.id}','cold')">🥶<br><span style="font-size:11px;">Too cold</span></button>
          <button class="feel-btn ${entry.weatherFeel==='right'?'sel-right':''}" onclick="setWeatherFeel('${entry.id}','right')">👍<br><span style="font-size:11px;">Just right</span></button>
          <button class="feel-btn ${entry.weatherFeel==='hot'?'sel-hot':''}" onclick="setWeatherFeel('${entry.id}','hot')">🥵<br><span style="font-size:11px;">Too hot</span></button>
        </div>
      </div>` : ''}

    ${(()=>{
      const sw = S.styleWith?.entryId === entry.id ? S.styleWith : null;
      const chips = ['Jacket','Shoes','Bag','Belt','Scarf','Hat','Jewellery','Layer'];
      const budgetLabel = {1:'budget',2:'mid-range',3:'luxury'}[S.shopBudget] || 'mid-range';

      if (sw?.loading) return `
        <div style="margin:0 20px 20px;padding:20px;background:var(--surface);border:1.5px solid var(--gold);border-radius:var(--r);text-align:center;">
          <div style="font-size:24px;margin-bottom:8px;">🪄</div>
          <div style="font-size:14px;font-weight:600;color:var(--text);">Finding the perfect ${esc(sw.need)}…</div>
          <div style="font-size:12px;color:var(--text-3);margin-top:4px;">Claude is analysing your outfit</div>
        </div>`;

      if (sw?.result) {
        const r = sw.result;
        const q = encodeURIComponent(r.searchQuery || sw.need);
        const q2 = r.altQuery ? encodeURIComponent(r.altQuery) : null;
        return `
        <div style="margin:0 20px 20px;padding:18px;background:var(--gold-bg);border:1.5px solid var(--gold);border-radius:var(--r);">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;">
            <div style="font-size:11px;font-weight:700;color:var(--gold-dk);text-transform:uppercase;letter-spacing:.05em;">🪄 Style it with</div>
            <button onclick="S.styleWith=null;render()" style="background:none;border:none;font-size:18px;color:var(--text-3);cursor:pointer;padding:0;line-height:1;">✕</button>
          </div>
          <div style="font-size:16px;font-weight:700;color:var(--text);margin-bottom:6px;">${esc(r.recommendation)}</div>
          <div style="font-size:13px;color:var(--text-2);line-height:1.5;margin-bottom:14px;">"${esc(r.reasoning)}"</div>
          <div style="display:flex;flex-direction:column;gap:8px;">
            <a href="https://www.google.com/search?tbm=shop&q=${q}" target="_blank" rel="noopener"
              style="display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;background:var(--gold);color:#fff;border-radius:var(--r-sm);font-size:14px;font-weight:700;text-decoration:none;">
              🛍 Shop on Google
            </a>
            ${q2 ? `<a href="https://www.google.com/search?tbm=shop&q=${q2}" target="_blank" rel="noopener"

              🔍 Also try: "${esc(r.altQuery)}"
            </a>` : ''}
            <button onclick="S.styleWith={entryId:'${entry.id}',need:'',loading:false,result:null};render()"

      return `

          <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;">
            ${chips.map(c => `
              <button onclick="doStyleWith('${entry.id}','${c}')"

                onmousedown="this.style.background='var(--gold-bg)';this.style.borderColor='var(--gold)'"
                onmouseup="this.style.background='';this.style.borderColor=''">
