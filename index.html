// ── Fashion sketch SVG builder ────────────────────────────────────────────────
function buildFashionSketchSVG(persona) {
  const colors = getPersonaColors(persona);
  const txt = ((persona?.headline||'') + ' ' + (persona?.body||'')).toLowerCase();
  const ink = '#1C1C1E';
  const skin = '#F2D9B8';
  const blush = colors.accent + '30';
  const ac = colors.accent;

  // Deterministic hair style from persona headline
  let h = 0;
  for (const c of (persona?.headline || 'x')) h = (h * 31 + c.charCodeAt(0)) & 0x7fffffff;

// ── Pollinations.ai — free AI image generation, no API key needed ────────────
function hashStr(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) h = (Math.imul(31, h) + str.charCodeAt(i)) | 0;
  return Math.abs(h) % 99991;
}

function pollinationsFashionPortraitUrl(persona, seed) {
  // Use persona text directly so the portrait reflects the actual style description
  const headline = (persona.headline || '').trim();
  // Extract up to 5 descriptive phrases from the body (split on commas/periods)
  const bodyPhrases = (persona.body || '')
    .split(/[,.]+/)
    .map(s => s.trim())
    .filter(s => s.length > 4)
    .slice(0, 5)
    .join(', ');
  const prompt = `fashion editorial portrait illustration, "${headline}" personal style, ${bodyPhrases}, full figure elegant pose, high fashion magazine aesthetic, stylized artistic, soft gradient background, professional fashion illustration`;
  const useSeed = seed !== undefined ? seed : hashStr(headline);
  return `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=400&height=600&model=flux&nologo=true&seed=${useSeed}`;
}

function pollinationsWardrobeSketchUrl(name, category) {
  const prompt = `fashion flat sketch illustration, ${name}, ${category||'clothing'}, clean minimalist line art, white background, fashion design technical drawing, professional apparel sketch, editorial style`;
  return `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=512&height=512&model=flux&nologo=true&seed=${hashStr((name||'')+(category||''))}`;
}

function generateStyleAvatar(force) {
  const persona = S.stylePersona;
  if (!persona) { toast('Generate your style portrait first'); return; }
  // Without force, show existing portrait if it already matches this persona
  if (!force && S.styleAvatar?.personaTs === persona.ts && (S.styleAvatar.url || S.styleAvatar.svg)) {
    S.showShareCard = true; render(); return;
  }
  // Force (regenerate) uses a random seed for a fresh image; first-time uses deterministic seed
  const seed = force ? (Date.now() % 99991) : undefined;
  const url = pollinationsFashionPortraitUrl(persona, seed);
  S.styleAvatar = { url, personaTs: persona.ts, ts: Date.now() };
  localStorage.setItem('closet-style-avatar', JSON.stringify(S.styleAvatar)); fsSet('styleAvatar', S.styleAvatar);
  S.showShareCard = true;
  render();
  toast(force ? 'Generating a new portrait — give it a few seconds ✨' : 'Generating your fashion portrait — give it a few seconds ✨');
}

// ── Canvas text wrap helper ───────────────────────────────────────────────────
function canvasWrapText(ctx, text, maxWidth) {
  const words = text.split(' ');
  const lines = []; let line = '';
  for (const word of words) {
    const test = line ? line + ' ' + word : word;
    if (ctx.measureText(test).width > maxWidth && line) { lines.push(line); line = word; }
    else line = test;
  }
  if (line) lines.push(line);
  return lines;
}

// ── Export share card as PNG ──────────────────────────────────────────────────
// Helper: load an image URL onto a canvas context robustly.
// Strategy: fetch → blob URL (avoids canvas taint) → fallback to crossOrigin img.
async function loadImageOntoCanvas(ctx, src, x, y, w, h) {
  if (!src) return false;
  // Strategy 1: fetch as blob so canvas stays untainted
  try {
    const resp = await fetch(src, { mode: 'cors' });
    if (resp.ok) {
      const blob = await resp.blob();
      const blobUrl = URL.createObjectURL(blob);
      const ok = await new Promise(res => {
        const img = new Image();
        img.onload  = () => { try { ctx.drawImage(img, x, y, w, h); } catch(e){} URL.revokeObjectURL(blobUrl); res(true); };
        img.onerror = () => { URL.revokeObjectURL(blobUrl); res(false); };
        img.src = blobUrl;
        setTimeout(() => res(false), 8000);
      });
      if (ok) return true;
    }
  } catch(e) {}
  // Strategy 2: crossOrigin img (requires CORS headers from server)
  return await new Promise(res => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload  = () => { try { ctx.drawImage(img, x, y, w, h); res(true); } catch(e) { res(false); } };
    img.onerror = () => res(false);
    img.src = src;
    setTimeout(() => res(false), 20000);
  });
}

async function exportShareCard() {
  const persona = S.stylePersona; if (!persona) return;
  const colors = getPersonaColors(persona);
  const avatar = S.styleAvatar;
  const sz = 1080;

  toast('Building your share card… ✨');

  const canvas = document.createElement('canvas');
  canvas.width = sz; canvas.height = sz;
  const ctx = canvas.getContext('2d');

  // Background gradient
  const grad = ctx.createLinearGradient(0, 0, sz*0.6, sz);
  grad.addColorStop(0, colors.bg1);
  grad.addColorStop(1, colors.bg2);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, sz, sz);

  // Subtle diagonal texture lines
  ctx.strokeStyle = colors.accent + '18';
  ctx.lineWidth = 1;
  for (let i = -sz; i < sz*2; i += 40) {
    ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i + sz, sz); ctx.stroke();
  }

  // Top accent bar
  ctx.fillStyle = colors.accent;
  ctx.fillRect(0, 0, sz, 6);

  // "✦ CLOSET" top-left logo
  ctx.fillStyle = colors.accent;
  ctx.font = 'bold 26px Georgia, serif';
  ctx.textAlign = 'left';
  ctx.fillText('✦ CLOSET', 72, 68);

  // "Style Portrait" label top-right
  ctx.fillStyle = colors.textSub;
  ctx.font = '500 20px Georgia, serif';
  ctx.textAlign = 'right';
  ctx.fillText('Style Portrait', sz - 72, 68);

  // Avatar — try to draw the AI portrait; fall back to an initial circle
  const avW = 300, avH = 400, avX = (sz - avW) / 2, avY = 100;
  let avatarDrawn = false;
  if (avatar?.url) {
    avatarDrawn = await loadImageOntoCanvas(ctx, avatar.url, avX, avY, avW, avH);
  } else if (avatar?.svg) {
    try {
      const blob = new Blob([avatar.svg], {type:'image/svg+xml;charset=utf-8'});
      const blobUrl = URL.createObjectURL(blob);
      avatarDrawn = await new Promise(res => {
        const img = new Image();
        img.onload  = () => { ctx.drawImage(img, avX, avY, avW, avH); URL.revokeObjectURL(blobUrl); res(true); };
        img.onerror = () => { URL.revokeObjectURL(blobUrl); res(false); };
        img.src = blobUrl;
        setTimeout(() => res(false), 4000);
      });
    } catch(e) {}
  }
  if (!avatarDrawn) {
    // Placeholder circle with initials
    ctx.fillStyle = colors.accent + '28';
    ctx.beginPath(); ctx.arc(sz/2, avY + avH/2, 130, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = colors.accent + '66';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(sz/2, avY + avH/2, 130, 0, Math.PI*2); ctx.stroke();
    ctx.fillStyle = colors.accent;
    ctx.font = 'bold 90px Georgia, serif';
    ctx.textAlign = 'center';
    ctx.fillText((S.profileName||'?').slice(0,1).toUpperCase(), sz/2, avY + avH/2 + 32);
    ctx.textAlign = 'left';
  }

  // Persona label pill
  const textTop = avY + avH + 40;
  ctx.textAlign = 'center';
  const labelTxt = '✦  S T Y L E  P O R T R A I T';
  ctx.font = '600 18px Georgia, serif';
  const lw = ctx.measureText(labelTxt).width;
  ctx.fillStyle = colors.accent + '22';
  const pillX = sz/2 - lw/2 - 16, pillY = textTop - 18, pillW = lw + 32, pillH = 30, pillR = 15;
  ctx.beginPath();
  ctx.moveTo(pillX + pillR, pillY);
  ctx.lineTo(pillX + pillW - pillR, pillY); ctx.arcTo(pillX+pillW, pillY, pillX+pillW, pillY+pillR, pillR);
  ctx.lineTo(pillX+pillW, pillY+pillH-pillR); ctx.arcTo(pillX+pillW, pillY+pillH, pillX+pillW-pillR, pillY+pillH, pillR);
  ctx.lineTo(pillX+pillR, pillY+pillH); ctx.arcTo(pillX, pillY+pillH, pillX, pillY+pillH-pillR, pillR);
  ctx.lineTo(pillX, pillY+pillR); ctx.arcTo(pillX, pillY, pillX+pillR, pillY, pillR);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = colors.accent;
  ctx.fillText(labelTxt, sz/2, textTop);

  // Headline (large, wrapped)
  ctx.fillStyle = colors.text;
  ctx.font = 'bold 52px Georgia, serif';
  const headLines = canvasWrapText(ctx, persona.headline, sz - 180);
  headLines.forEach((l, i) => ctx.fillText(l, sz/2, textTop + 66 + i * 62));

  // Thin divider
  const divY = textTop + 66 + headLines.length * 62 + 16;
  ctx.strokeStyle = colors.accent + '55';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(sz/2 - 160, divY); ctx.lineTo(sz/2 + 160, divY); ctx.stroke();

  // Body text (up to 3 lines)
  ctx.fillStyle = colors.textSub;
  ctx.font = '300 26px Georgia, serif';
  const bodyLines = canvasWrapText(ctx, persona.body, sz - 220);
  bodyLines.slice(0, 3).forEach((l, i) => ctx.fillText(l, sz/2, divY + 42 + i * 36));

  // Bottom bar
  const botY = sz - 70;
  ctx.fillStyle = colors.accent + '18';
  ctx.fillRect(0, botY, sz, sz - botY);
  ctx.strokeStyle = colors.accent + '55';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, botY); ctx.lineTo(sz, botY); ctx.stroke();
  ctx.fillStyle = colors.accent;
  ctx.font = 'bold 22px Georgia, serif';
  ctx.textAlign = 'center';
  ctx.fillText('closet.app  ·  Your AI-Powered Style Journal', sz/2, botY + 42);
  ctx.textAlign = 'left';

  // Export / share — toBlob wrapped in try/catch to handle tainted-canvas edge case
  try {
    const blob = await new Promise((res, rej) =>
      canvas.toBlob(b => b ? res(b) : rej(new Error('empty blob')), 'image/png', 0.95));
    const file = new File([blob], 'style-portrait.png', {type:'image/png'});
    if (navigator.share && navigator.canShare?.({files:[file]})) {
      try {
        await navigator.share({ files:[file], title: persona.headline, text: `✦ ${persona.headline}\n\n${persona.body}\n\n— made with Closet` });
        return;
      } catch(e) { if (e.name === 'AbortError') return; }
    }
    // Fallback: download
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = 'style-portrait.png';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1500);
    toast('Image saved to downloads ✓');
  } catch(e) {
    console.error('exportShareCard error:', e);
    // Last resort: share just the portrait URL + text
    if (avatar?.url) {
      await shareText(persona.headline, `✦ ${persona.headline}\n\n${persona.body}\n\nPortrait: ${avatar.url}\n\n— made with Closet`);
    } else {
      toast('Could not export — try again');
    }
  }
}

function heartPersona() {
  if (!S.stylePersona) return;
  const p = S.stylePersona;
  const idx = S.personaHistory.findIndex(h => h.ts === p.ts);
  if (idx >= 0) {
    // Already saved — toggle off
    S.personaHistory.splice(idx, 1);
    toast('Removed from Style Journey');
  } else {
    // Save a snapshot (headline + body + timestamp)
    S.personaHistory.push({ headline: p.headline, body: p.body, ts: p.ts });
    toast('Saved to your Style Journey ♥');
  }
  localStorage.setItem('closet-persona-history', JSON.stringify(S.personaHistory)); fsSet('personaHistory', S.personaHistory);
  render();
}

}

/* ================================================================
   WEATHER (Open-Meteo — no API key required)
   ================================================================ */
function weatherCodeToLabel(code) {
  if (code === 0)           return 'Clear';
  if (code <= 3)            return 'Partly Cloudy';
  if (code <= 48)           return 'Cloudy';
  if (code <= 67)           return 'Rainy';
  if (code <= 77)           return 'Snowy';
  if (code <= 82)           return 'Showery';
  return 'Stormy';
}
function weatherCodeToIcon(code) {
  if (code === 0)  return '☀️';
  if (code <= 3)   return '⛅';
  if (code <= 48)  return '☁️';
  if (code <= 67)  return '🌧️';
  if (code <= 77)  return '❄️';
  if (code <= 82)  return '🌦️';
  return '⛈️';
}
async function getLocation() {
  return new Promise((resolve, reject) =>
    navigator.geolocation.getCurrentPosition(resolve, reject, { timeout: 8000 }));
}
async function fetchCurrentWeather() {
  try {
    const pos = await getLocation();
    const { latitude: lat, longitude: lon } = pos.coords;
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat.toFixed(4)}&longitude=${lon.toFixed(4)}&current=temperature_2m,weather_code&temperature_unit=fahrenheit&timezone=auto`;
    const r = await fetch(url); if (!r.ok) return null;
    const data = await r.json();
    const tempF = Math.round(data.current?.temperature_2m ?? 999);
    const code  = data.current?.weather_code ?? 0;
    if (tempF === 999) return null;
    return { tempF, condition: weatherCodeToLabel(code), icon: weatherCodeToIcon(code) };
  } catch { return null; }
}
async function fetchForecastWeather(dateStr) {
  // dateStr: 'YYYY-MM-DD'. Open-Meteo supports up to 16-day forecast.
  try {
    const pos = await getLocation();
    const { latitude: lat, longitude: lon } = pos.coords;
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat.toFixed(4)}&longitude=${lon.toFixed(4)}&daily=temperature_2m_max,temperature_2m_min,weather_code&temperature_unit=fahrenheit&timezone=auto&start_date=${dateStr}&end_date=${dateStr}`;
    const r = await fetch(url); if (!r.ok) return null;
    const data = await r.json();
    const hi   = Math.round(data.daily?.temperature_2m_max?.[0] ?? 999);
    const lo   = Math.round(data.daily?.temperature_2m_min?.[0] ?? 999);
    const code = data.daily?.weather_code?.[0] ?? 0;
    if (hi === 999) return null;
    return { hi, lo, condition: weatherCodeToLabel(code), icon: weatherCodeToIcon(code) };
  } catch { return null; }
}

   ================================================================ */
async function initWeatherPin() {
  // Use cached pin if <90 minutes old
  const cached = JSON.parse(localStorage.getItem('closet-weather-pin') || 'null');
  if (cached?.quip && (Date.now() - cached.ts) < 90 * 60 * 1000) {
    S.weatherPin = cached; render(); return;
  }
  if (S._weatherPinLoading) return;
  S._weatherPinLoading = true;
  try {
    const pos = await getLocation();
    const { latitude: lat, longitude: lon } = pos.coords;
    // Fetch weather + reverse geocode in parallel
    const [weatherResp, geoResp] = await Promise.all([
      fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat.toFixed(4)}&longitude=${lon.toFixed(4)}&current=temperature_2m,weather_code&temperature_unit=fahrenheit&timezone=auto`),
      fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat.toFixed(4)}&lon=${lon.toFixed(4)}`, { headers: { 'Accept-Language': 'en' } }),
    ]);
    if (!weatherResp.ok) { S._weatherPinLoading = false; return; }
    const weatherData = await weatherResp.json();
    const geoData = geoResp.ok ? await geoResp.json() : {};
    const tempF = Math.round(weatherData.current?.temperature_2m ?? 999);
    const code  = weatherData.current?.weather_code ?? 0;
    if (tempF === 999) { S._weatherPinLoading = false; return; }
    const condition = weatherCodeToLabel(code);
    const icon      = weatherCodeToIcon(code);
    const addr      = geoData.address || {};
    const city = addr.city || addr.town || addr.village || addr.county || addr.state || 'Your city';
    // Generate fashion quip via Claude Haiku (graceful fallback if no key)
    let quip = `${condition} · ${tempF}°F`;
    if (S.apiKey) {
      try {
        const r = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: { 'Content-Type':'application/json','x-api-key':S.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true' },
          body: JSON.stringify({
            model: 'claude-haiku-4-5-20251001', max_tokens: 60,
            messages: [{ role: 'user', content: `Location: ${city}. Current weather: ${condition}, ${tempF}°F. Write ONE witty, fashion-forward caption (max 12 words) that weaves together today's weather and a style tip or observation — ideally with a clever pun or wordplay. Playful, not cheesy. Good examples: "fog advisory: your trench coat's time to shine", "sunshine warning: hats are having a moment", "drizzle forecast: make the umbrella your accessory". Output ONLY the caption text, no quotes, no punctuation at end.` }]
          })
        });
        if (r.ok) { const d = await r.json(); quip = d.content?.[0]?.text?.trim() || quip; }
      } catch { /* fallback to default */ }
    }
    const pin = { city, tempF, icon, condition, quip, ts: Date.now() };
    S.weatherPin = pin;
    localStorage.setItem('closet-weather-pin', JSON.stringify(pin)); fsSet('weatherPin', pin);
    render();
  } catch { /* silent — location denied or network issue */ }
  finally { S._weatherPinLoading = false; }
}

async function buildSyncPayload() {

async function applySyncData(remote) {
  // Save local photos by id before merge
  const photoMap = {};
  S.entries.forEach(e  => { if (e.photo)  photoMap[`e-${e.id}`]  = e.photo; });
  S.wardrobe.forEach(w => { if (w.photo)  photoMap[`w-${w.id}`]  = w.photo; });

  // ── Entries: union by id, newer createdAt wins ──────────────
  const eMap = {};
  S.entries.forEach(e => eMap[e.id] = e);
  (remote.entries || []).forEach(re => {
    const local = eMap[re.id];
    if (!local || new Date(re.createdAt) >= new Date(local.createdAt)) eMap[re.id] = re;
  });
  const mergedEntries = Object.values(eMap).sort((a,b) => new Date(b.createdAt)-new Date(a.createdAt));
  mergedEntries.forEach(e => { if (photoMap[`e-${e.id}`]) e.photo = photoMap[`e-${e.id}`]; });

  // ── Wardrobe: union by id ────────────────────────────────────
  const wMap = {};
  S.wardrobe.forEach(w => wMap[w.id] = w);
  (remote.wardrobe || []).forEach(rw => { if (!wMap[rw.id]) wMap[rw.id] = rw; });
  const mergedWardrobe = Object.values(wMap);
  mergedWardrobe.forEach(w => { if (photoMap[`w-${w.id}`]) w.photo = photoMap[`w-${w.id}`]; });

  // Write to IndexedDB
  await Promise.all([
    ...mergedEntries.map(e => DB.entries.put(e)),
    ...mergedWardrobe.map(w => DB.wardrobe.put(w)),
  ]);
  S.entries  = await DB.entries.getAll();
  S.wardrobe = await DB.wardrobe.getAll();

  // ── Squad plans: union by id ─────────────────────────────────
  const sqMap = {};
  S.squadPlans.forEach(p => sqMap[p.id] = p);
  (remote.squadPlans || []).forEach(p => { if (!sqMap[p.id]) sqMap[p.id] = p; });
  S.squadPlans = Object.values(sqMap);
  localStorage.setItem('closet-squad-plans', JSON.stringify(S.squadPlans)); fsSet('squadPlans', S.squadPlans);

  // ── Persona: newest wins ──────────────────────────────────────
  if (remote.persona && (!S.stylePersona || (remote.persona.ts||0) > (S.stylePersona?.ts||0))) {
    S.stylePersona = remote.persona;
    localStorage.setItem('closet-persona', JSON.stringify(S.stylePersona));
  }
  if (remote.personaHistory?.length) {
    const hMap = {};
    [...S.personaHistory, ...remote.personaHistory].forEach(h => hMap[h.ts] = h);
    S.personaHistory = Object.values(hMap).sort((a,b) => b.ts-a.ts);
    localStorage.setItem('closet-persona-history', JSON.stringify(S.personaHistory)); fsSet('personaHistory', S.personaHistory);
  }
  if (remote.styleAvatar && (!S.styleAvatar || (remote.styleAvatar.ts||0) > (S.styleAvatar?.ts||0))) {
    S.styleAvatar = remote.styleAvatar;
    localStorage.setItem('closet-style-avatar', JSON.stringify(S.styleAvatar)); fsSet('styleAvatar', S.styleAvatar);
  }

  // ── Profile: fill blanks from remote ─────────────────────────
  const pFields = ['profileName','profileAge','profileHeight','profileWeight',
    'profileGeneration','profileMBTI','profileZodiac','profileLocation','profileStyleWords'];
  const lsKeys  = ['closet-profile-name','closet-profile-age','closet-profile-height',
    'closet-profile-weight','closet-profile-gen','closet-profile-mbti','closet-profile-zodiac',
    'closet-profile-location','closet-profile-style-words'];
  pFields.forEach((f, i) => {
    if (remote[f] && !S[f]) { S[f] = remote[f]; localStorage.setItem(lsKeys[i], S[f]); }
  });

  // ── Shop data: union ─────────────────────────────────────────
  (remote.shopBlocked      || []).forEach(k => S.shopBlocked.add(k));
  (remote.purchasedQueries || []).forEach(k => S.purchasedQueries.add(k));
  localStorage.setItem('closet-shop-blocked',  JSON.stringify([...S.shopBlocked]));
  localStorage.setItem('closet-purchased',      JSON.stringify([...S.purchasedQueries]));
}

function generateSyncCode() {
  const uuid = typeof crypto.randomUUID === 'function'
    ? crypto.randomUUID()
    : ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g, c =>
        (c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> c / 4).toString(16));
  S.syncCode = uuid;
  localStorage.setItem('closet-sync-code', uuid);
  render();
  toast('New code generated — save it somewhere safe!');
}

// Strip photos before encoding so share codes stay small
function encodeSquadPlan(plan) {
  try {
    const slim = JSON.parse(JSON.stringify(plan));
    slim.members.forEach(m => {
      if (m.looks) Object.values(m.looks).forEach(l => { delete l.photo; });
    });
    return 'CLOSET-SQUAD-' + btoa(unescape(encodeURIComponent(JSON.stringify(slim))));
  } catch { return null; }
}
function decodeSquadPlan(code) {
  const prefix = 'CLOSET-SQUAD-';
  const idx = code.indexOf(prefix);
  if (idx === -1) return null;
  try { return JSON.parse(decodeURIComponent(escape(atob(code.slice(idx + prefix.length))))); }
  catch { return null; }
}

function confirmJoinSquad() {
  const flow = S.squadFlow; if (!flow || flow.step !== 'join') return;

  if (!imported) { toast('Invalid squad code — check and try again'); return; }
  const existing = S.squadPlans.find(p => p.id === imported.id);
  if (existing) {
    // Merge: keep local photos & my slot data, update everything else
    const myMem = existing.members.find(m => m.isMe);
    const merged = imported.members.map(m => {
      if (myMem && m.id === myMem.id) {
        // Merge looks: keep local photos, take incoming text/reactions/scores
        if (!m.looks) m.looks = {};
        Object.entries(myMem.looks||{}).forEach(([evtId, lk]) => {
          if (!m.looks[evtId]) m.looks[evtId] = lk;
          else if (lk.photo) m.looks[evtId].photo = lk.photo; // preserve my photos
        });
        m.isMe = true;
        return m;
      }
      return existing.members.find(lm => lm.id === m.id) || m;
    });
    imported.members.forEach(m => { if (!merged.find(mm=>mm.id===m.id)) merged.push(m); });
    existing.members = merged;
    existing.days = imported.days || existing.days || [];
    existing.dateStart = imported.dateStart || existing.dateStart || '';
    existing.dateEnd = imported.dateEnd || existing.dateEnd || '';
    existing.squadVibeChecks = imported.squadVibeChecks || existing.squadVibeChecks || {};

// ── Day helpers ───────────────────────────────────────────────
function generateSquadDays(dateStart, dateEnd) {
  if (!dateStart) return [];
  const start = new Date(dateStart + 'T12:00:00');
  const end = dateEnd ? new Date(dateEnd + 'T12:00:00') : start;
  if (isNaN(start) || isNaN(end) || end < start) return [{ date: dateStart, description: '' }];
  const days = [];
  const curr = new Date(start);
  let count = 0;
  while (curr <= end && count < 14) {
    const y = curr.getFullYear();
    const m = String(curr.getMonth()+1).padStart(2,'0');
    const d = String(curr.getDate()).padStart(2,'0');
    days.push({ date: `${y}-${m}-${d}`, description: '' });
    curr.setDate(curr.getDate() + 1);
    count++;
  }
  return days;
}

function updateSquadDayDesc(planId, date, desc) {
  const plan = S.squadPlans.find(p => p.id === planId); if (!plan) return;
  const day = (plan.days||[]).find(d => d.date === date); if (!day) return;
  day.description = desc; saveSquadPlans();
}

    const dc = plan.dressCode || 'none';

    const r = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':S.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body: JSON.stringify({ model:'claude-haiku-4-5-20251001', max_tokens:100,

      })
    });
    if (r.ok) {
      const d = await r.json();
      const parsed = JSON.parse((d.content?.[0]?.text||'{}').replace(/```json|```/g,'').trim());
      look.vibeScore = parsed.score ?? null; look.vibeNote = parsed.note ?? null;
    } else { look.vibeScore = null; }
  } catch { look.vibeScore = null; }
  saveSquadPlans(); render();
}

async function runSquadVibeCheck(planId, eventId) {
  const plan = S.squadPlans.find(p => p.id === planId); if (!plan) return;
  const dressed = plan.members.filter(m => getMemberLook(plan, m.id, eventId)?.outfit?.trim());
  if (!dressed.length) { toast('Add some looks first'); return; }
  if (!S.apiKey) { toast('Add your API key in Settings'); return; }
  if (!plan.squadVibeChecks) plan.squadVibeChecks = {};
  plan.squadVibeChecks[eventId] = { loading:true }; saveSquadPlans(); render();
  try {
    const t = getSquadType(plan.type);
    const day = (plan.days||[]).find(d => d.date === eventId);
    const evtLabel = day ? ` · ${new Date(day.date+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}${day.description?' — '+day.description:''}` : '';
    const dc = plan.dressCode || 'none';
    const list = dressed.map(m => `- ${m.name}: ${getMemberLook(plan,m.id,eventId).outfit}`).join('\n');
    const r = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':S.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body: JSON.stringify({ model:'claude-haiku-4-5-20251001', max_tokens:220,
        messages:[{ role:'user', content:`Stylish event consultant. Event: "${plan.name}" (${t.label})${evtLabel}. Vibe: "${plan.vibe||'unspecified'}". Dress code: "${dc}". Squad:\n${list}\n\n2-3 sentences: Is the squad cohesive? Who's nailing it? Any clashes? Playful, specific, fashion-forward. Plain text.` }]
      })
    });
    if (r.ok) {
      const d = await r.json();
      plan.squadVibeChecks[eventId] = { text:d.content?.[0]?.text?.trim()||'', ts:Date.now() };
    } else { plan.squadVibeChecks[eventId] = null; }
  } catch { plan.squadVibeChecks[eventId] = null; }
  saveSquadPlans(); render();
}

async function shareSquadPlan(planId) {
  const plan = S.squadPlans.find(p => p.id === planId); if (!plan) return;
  const code = encodeSquadPlan(plan); if (!code) { toast('Could not encode plan'); return; }
  const t = getSquadType(plan.type);
  const text = `${t.icon} ${plan.name} — Squad Plan on Closet\n\nPaste this code in Closet → Plan → Squad Mode → Join:\n\n${code}\n\n(Note: your photos stay on your device — only outfit descriptions are shared)`;
  if (navigator.share) {
    try { await navigator.share({ title:plan.name, text }); return; } catch(e) { if(e.name==='AbortError') return; }
  }
  try { await navigator.clipboard.writeText(text); toast('Copied! Share with your squad ✓'); }
  catch { toast('Could not copy'); }
}

function deleteSquadPlan(id) {
  if (!confirm('Remove this squad plan from your device?')) return;
  S.squadPlans = S.squadPlans.filter(p => p.id !== id);
  saveSquadPlans(); navigate('plan'); toast('Removed');
}

const FASHION_RSS_FEEDS = [
  { url: 'https://www.vogue.com/feed/rss',            source: 'Vogue' },
  { url: 'https://www.harpersbazaar.com/rss/all.xml', source: "Harper's Bazaar" },
  { url: 'https://wwd.com/feed/',                     source: 'WWD' },
  { url: 'https://www.whowhatwear.com/rss',           source: 'Who What Wear' },
  { url: 'https://www.elle.com/rss/all.xml',          source: 'Elle' },
  { url: 'https://fashionista.com/rss',               source: 'Fashionista' },
  { url: 'https://www.refinery29.com/rss.xml',        source: 'Refinery29' },
];

async function fetchNewsFlash() {
  // — Try real RSS feeds via rss2json (no API key required) —
  // Shuffle feeds so we get variety across refreshes
  const shuffled = [...FASHION_RSS_FEEDS].sort(() => Math.random() - 0.5);
  for (const feed of shuffled) {
    try {
      const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feed.url)}&count=10`;
      const r = await fetch(apiUrl);
      if (!r.ok) continue;
      const data = await r.json();
      if (data.status !== 'ok' || !data.items?.length) continue;
      // Pick from the first 5 recent items randomly so it feels fresh
      const pool = data.items.slice(0, 5).filter(i => i.title && i.link);
      if (!pool.length) continue;
      const item = pool[Math.floor(Math.random() * pool.length)];
      // Strip HTML tags from description
      const rawDesc = (item.description || item.content || '').replace(/<[^>]+>/g, '').trim();
      const summary = rawDesc.slice(0, 200).replace(/\s+/g, ' ').trim() || 'Read the full article for the latest.';
      return {
        headline: item.title.replace(/\s*[-|–—].*$/, '').trim(),
        summary: summary.endsWith('.') ? summary : summary + '.',
        url: item.link,
        source: feed.source,
        thumbnail: item.thumbnail || item.enclosure?.link || null,
        fetchedAt: Date.now(),
      };
    } catch { continue; }
  }

  // — Fallback: Claude haiku generates a trend insight —
  const key = S.apiKey.trim();
  if (!key) throw new Error('No API key — add your Anthropic key in Settings');
  const month = new Date().toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': key,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: 'claude-haiku-4-5-20251001', max_tokens: 200,
      messages: [{ role: 'user', content:
        `You are a fashion editor writing a daily trend alert for a style journal app. Write one specific, exciting fashion trend or style insight for ${month}. Be concrete — mention a specific aesthetic, color, fabric, silhouette, or cultural moment driving fashion right now. Make it feel like a real magazine blurb, not generic advice. Return ONLY valid JSON with no markdown, no code fences, no extra text: {"headline": "punchy headline under 10 words", "summary": "2 vivid sentences about the trend", "source": "Style Intelligence"}`
      }],
    }),
  });
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    throw new Error(err?.error?.message || `API error ${resp.status}`);
  }
  const data = await resp.json();
  const raw = (data.content?.[0]?.text || '').trim();
  const clean = raw.replace(/^```(?:json)?\n?/, '').replace(/\n?```$/, '').trim();
  const jsonMatch = clean.match(/\{[\s\S]*\}/);
  if (!jsonMatch) throw new Error('Could not parse trend from Claude response');
  return { ...JSON.parse(jsonMatch[0]), url: null, thumbnail: null, fetchedAt: Date.now() };
}

  localStorage.removeItem('closet-newsflash');

}

async function suggestOutfits(eventDesc, forecast) {
  const key = S.apiKey.trim(); if (!key) return null;
  // Build a concise snapshot of past outfits with weather feel data
  const outfitSnap = S.entries.slice(0, 30).map(e => {
    const items = (e.items||[]).map(i=>`${i.icon||''}${i.name}`).join(', ');
    const parts = [`styleRating:${e.rating}`, `items:[${items}]`];
    if (e.confidence != null) parts.push(`confidenceScore:${e.confidence}`);
    if (e.occasionTag)  parts.push(`occasion:${e.occasionTag}`);
    if (e.weather)      parts.push(`temp:${e.weather.tempF}°F`);
    if (e.weatherFeel)  parts.push(`felt:${e.weatherFeel}`);
    return `{id:${e.id}, ${parts.join(', ')}}`;
  }).join('\n');
  // Wardrobe snapshot (exclude retiring items)
  const wardSnap = S.wardrobe.filter(w=>!w.retiring).map(w =>
    `{name:"${w.icon||''}${w.name}", cat:${w.category||'?'}, wears:${w.wears?.length||0}${w.brand?`, brand:${w.brand}`:''}}`
  ).join('\n');

  const weatherLine = forecast
    ? `Forecasted weather: ${forecast.icon} ${forecast.condition}, high ${forecast.hi}°F / low ${forecast.lo}°F`
    : 'No weather forecast available.';

  const profileParts = [
    S.profileName   ? `Name: ${S.profileName}`     : '',
    S.profileAge    ? `Age: ${S.profileAge}`        : '',
    S.profileHeight ? `Height: ${S.profileHeight}`  : '',
    S.profileWeight ? `Weight: ${S.profileWeight}`  : '',
  ].filter(Boolean).join(', ');
  const prompt = `You are a personal stylist with access to a client's full wardrobe and outfit history. Suggest exactly 3 outfit ideas for an upcoming event.
${profileParts ? `\nCLIENT PROFILE: ${profileParts}` : ''}
EVENT: "${eventDesc}"
${weatherLine}

OUTFIT HISTORY (most recent 30):
${outfitSnap || '(none yet)'}

WARDROBE ITEMS:
${wardSnap || '(none yet)'}

Rules:
- Base suggestions on real items from the outfit history and wardrobe above. Reference item names specifically.
- Factor in the weather: if it's cold, suggest layers; if hot, suggest breathable fabrics.
- If weatherFeel data shows the person ran hot/cold at similar temps, adjust accordingly.
- Prioritize outfits and items with high confidenceScore (8–10) — these are outfits the person felt best in.
- Avoid centering suggestions around low-confidence outfits (≤4) unless the styleRating was exceptionally high.
- Vary the suggestions (e.g., dressy, casual, and a bold pick).
- Each suggestion should reference specific item names from their history/wardrobe when possible.

Return a JSON array with exactly 3 objects:
[
  {
    "outfitId": "<id from outfit history, or null if remix>",
    "items": ["ItemName", ...],
    "reasoning": "2 sentences explaining why this works for the event",
    "weatherNote": "1 sentence on temperature suitability"
  }
]
Do not include emojis in item names. Return only the JSON array, no other text.`;

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001', max_tokens: 800,
        messages: [{ role: 'user', content: prompt }],
      }),
    });
    if (!resp.ok) return null;
    const data = await resp.json();
    const text = (data.content?.[0]?.text || '').trim();
    const jsonStr = text.startsWith('[') ? text : text.replace(/^```json\n?/, '').replace(/\n?```$/, '');
    return JSON.parse(jsonStr);
  } catch(e) { console.error('suggestOutfits error', e); return null; }
}

/* ================================================================
   SHOPPING LIST HELPERS
   ================================================================ */
function buildShoppingList() {
  // Build a set of "owned" keywords from active wardrobe names so we can
  // suppress recs for items the user clearly already has
  const ownedTokens = new Set();
  S.wardrobe.filter(w => !w.retiredFromCloset).forEach(w => {
    // extract meaningful words (4+ chars) from item name + category
    const text = `${w.name} ${w.category||''}`.toLowerCase();
    text.split(/\s+/).forEach(t => { if (t.length >= 4) ownedTokens.add(t); });
  });
  function looksOwned(query) {
    const qTokens = query.toLowerCase().split(/\s+/).filter(t => t.length >= 4);
    if (!qTokens.length) return false;
    // Flag if ≥ 2 meaningful query words match owned tokens (avoids single-word false hits)
    const hits = qTokens.filter(t => ownedTokens.has(t)).length;
    return hits >= 2 || (qTokens.length === 1 && hits === 1);
  }

  const map = {}; // normalizedKey → { query, count, outfitIds, results }
  for (const entry of S.entries) {
    if (!entry.shopQueries?.length) continue;
    for (const rawQ of entry.shopQueries) {
      const q = cleanShopQuery(rawQ); // strip any baked-in budget suffix
      const key = q.toLowerCase().trim();
      if (!key) continue;
      if (S.purchasedQueries.has(key)) continue;
      if (looksOwned(key)) continue; // skip items already in wardrobe
      if (!map[key]) {
        // Find best cached results: entry shopResults first, then localStorage cache
        let results = [];
        if (entry.shopResults) {
          const hit = entry.shopResults.find(r => cleanShopQuery(r.query).toLowerCase().trim() === key);
          if (hit) results = hit.items;
        }
        if (!results.length && S.shopCache[key]) results = S.shopCache[key].results;
        map[key] = { query: q, count: 0, outfitIds: [], results };
      }
      map[key].count++;
      map[key].outfitIds.push(entry.id);
      // Upgrade results if we find them in a later entry
      if (!map[key].results.length && entry.shopResults) {
        const hit = entry.shopResults.find(r => cleanShopQuery(r.query).toLowerCase().trim() === key);
        if (hit) map[key].results = hit.items;
      }
    }
  }
  return Object.values(map).sort((a,b) => b.count - a.count);
}

function budgetSearchSuffix(b) {
  if (b === 1) return ' affordable under $50';
  if (b === 3) return ' luxury designer';
  return ''; // mid-range: no modifier, let results be organic
}
// Strip any stored budget suffix so display text is always clean
function cleanShopQuery(q) {
  return q
    .replace(/ affordable under \$50\b/gi, '')
    .replace(/ under \$\d+\b/gi, '')
    .replace(/ luxury designer\b/gi, '')
    .replace(/ \(\$[\d,]+\+?\)/gi, '')
    .trim();
}

function setShopBudget(v) {
  S.shopBudget = v;
  localStorage.setItem('closet-shop-budget', String(v)); fsSet('shopBudget', v);
  render();
}

function blockShopItem(query) {
  const key = query.toLowerCase().trim();
  S.shopBlocked.add(key);
  localStorage.setItem('closet-shop-blocked', JSON.stringify([...S.shopBlocked])); fsSet('shopBlocked', [...S.shopBlocked]);
  render();
  toast('Removed from your list');
}
function unblockShopItem(query) {
  const key = query.toLowerCase().trim();
  S.shopBlocked.delete(key);
  localStorage.setItem('closet-shop-blocked', JSON.stringify([...S.shopBlocked])); fsSet('shopBlocked', [...S.shopBlocked]);
  render();
  toast('Restored to list ✓');
}
function markPurchased(query) {
  S.purchasedQueries.add(query.toLowerCase().trim());
  localStorage.setItem('closet-purchased', JSON.stringify([...S.purchasedQueries])); fsSet('purchased', [...S.purchasedQueries]);
  render();
  toast('Bought it! ✓ Removed from list');
}

async function fetchShopQuery(query) {
  if (!S.googleKey.trim()) { toast('Add your Google API key in Settings ⚙️'); return; }
  if (!S.googleCx.trim())  { toast('Add your Google Search Engine ID in Settings ⚙️'); return; }
  Object.assign(S, { loading:true, loadingMsg:'Finding products…' }); render();
  try {
    const res = await fetchShopResults([query]);
    if (res.length && res[0].items?.length) {
      const key = query.toLowerCase().trim();
      S.shopCache[key] = { results: res[0].items, ts: Date.now() };
      localStorage.setItem('closet-shop-cache', JSON.stringify(S.shopCache)); fsSet('shopCache', S.shopCache);
      toast('Found products! 🛍');
    } else {
      toast('No products found for this search.');
    }
  } catch(e) {
    const msg = e.message || 'Unknown error';
    if (msg.includes('API key')) toast('Invalid API key — check Settings ⚙️');
    else if (msg.includes('cx') || msg.includes('Search Engine')) toast('Invalid Search Engine ID — check Settings ⚙️');
    else if (msg.includes('quota') || msg.includes('429')) toast('Google quota exceeded for today');
    else toast(`Search error: ${msg.slice(0, 60)}`);
  } finally {
    Object.assign(S, { loading:false }); render();
  }
}

function buildJourneyHTML() {
  const persona = S.stylePersona;
  const currentTs = persona ? persona.ts : null;
  const journeyPast = S.personaHistory.filter(h => h.ts !== currentTs);
  if (!journeyPast.length) return '';
  const sorted = [...journeyPast].sort((a, b) => b.ts - a.ts);
  const fmtTs = ts => {
    if (!ts) return '';
    const d = new Date(ts);
    return d.toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
  };
  // Top card: fully open. Older cards: just the header strip peeking out below.
  const cardsHTML = sorted.map((h, i) => {
    const isTop = i === 0;
    const zIndex = sorted.length - i + 1;
    if (isTop) {
      return `
        <div class="journey-top" style="z-index:${zIndex};">
          <div class="journey-stack-date">♥ ${fmtTs(h.ts)}</div>
          <div class="journey-stack-headline">${esc(h.headline)}</div>
          <div class="journey-stack-body">${esc(h.body)}</div>
          <button class="journey-stack-del" onclick="removeFromJourney(${h.ts})" title="Remove">✕</button>
        </div>`;
    }
    return `
      <div class="journey-peek" style="z-index:${zIndex};">
        <div class="journey-stack-date">♥ ${fmtTs(h.ts)}</div>
        <div class="journey-stack-headline">${esc(h.headline)}</div>
        <button class="journey-stack-del" onclick="removeFromJourney(${h.ts})" title="Remove">✕</button>
      </div>`;
  }).join('');

  return `
    <div style="margin-top:4px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
        <div style="font-size:10px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--text-3);">Style Journey</div>
        <span style="font-size:11px;color:var(--text-3);">${sorted.length} saved</span>

}

function setFilter(f) { S.filter = f; S.closetExpanded = false; render(); }

async function setRecReaction(entryId, recIdx, reaction) {
  const e = S.entries.find(e => e.id === entryId); if (!e) return;
  const rec = e.recommendations?.[recIdx]; if (!rec) return;
  if (!e.recReactions) e.recReactions = {};
  // Toggle: clicking the active reaction removes it
  if (e.recReactions[rec] === reaction) {
    delete e.recReactions[rec];
  } else {
    e.recReactions[rec] = reaction;
  }
  await DB.entries.put(e);
  S.entries = await DB.entries.getAll();
  render();
}

async function toggleDoNotRepeat(id) {
  const e = S.entries.find(e => e.id === id); if (!e) return;
  e.doNotRepeat = !e.doNotRepeat;
  await DB.entries.put(e); S.entries = await DB.entries.getAll(); render();
  toast(e.doNotRepeat ? "Flagged — won't suggest this again ✕" : 'Flag removed ✓');
}

function filteredEntries() {
  let arr = [...S.entries];
  if (S.filter === 'best')   arr.sort((a,b) => b.rating - a.rating);
  if (S.filter === 'recent') arr.sort((a,b) => new Date(b.createdAt)-new Date(a.createdAt));
  if (S.filter.startsWith('tag:')) {
    const tag = S.filter.slice(4);
    arr = arr.filter(e => e.occasionTag === tag);
  }
  return arr;
}

  </div>`;

  function shopItemEmoji(query) {
    const q = (query||'').toLowerCase();
    if (/boot|ankle boot|chelsea|combat boot/.test(q))      return '👢';
    if (/sneaker|trainer|athletic shoe|running shoe/.test(q)) return '👟';
    if (/heel|pump|stiletto|wedge/.test(q))                 return '👠';

    if (/wallet|pouch/.test(q))                             return '👛';

    if (/scarf|wrap/.test(q))                               return '🧣';
    if (/glove/.test(q))                                    return '🧤';
    if (/coat|parka|puffer|anorak/.test(q))                 return '🧥';
    if (/jacket|blazer/.test(q))                            return '🥼';
    if (/cardigan|sweater|pullover|knit|turtleneck/.test(q)) return '🧶';
    if (/dress|gown/.test(q))                               return '👗';
    if (/skirt/.test(q))                                    return '🩱';
    if (/jeans|denim/.test(q))                              return '👖';
    if (/pants|trousers|shorts|legging/.test(q))            return '👖';
    if (/shirt|blouse|button.down/.test(q))                 return '👔';
    if (/top|tee|tank|crop/.test(q))                        return '👕';
    if (/necklace|pendant|chain/.test(q))                   return '📿';
    if (/earring|bracelet|bangle/.test(q))                  return '💎';
    if (/ring/.test(q))                                     return '💍';
    if (/watch/.test(q))                                    return '⌚';
    if (/sunglasses|glasses|shades/.test(q))                return '🕶️';
    if (/belt/.test(q))                                     return '🩲';
    if (/suit|blazer|sport coat/.test(q))                   return '🤵';
    if (/swimsuit|bikini|swimwear/.test(q))                 return '👙';
    if (/sock/.test(q))                                     return '🧦';
    return '🛍️';
  }

  function shopItemBg(query) {
    // Deterministic warm pastel based on query string
    const palettes = [
      { bg:'#FDF5E4', border:'#ECD99A' }, // gold
      { bg:'#F0EBE4', border:'#D9C9BB' }, // taupe
      { bg:'#F7EEFA', border:'#DBBFE8' }, // lavender
      { bg:'#EAF4EE', border:'#AECFBC' }, // sage
      { bg:'#FEF0EE', border:'#F0BCAF' }, // blush
      { bg:'#EEF3FA', border:'#AEBFDC' }, // sky

    let h = 0; for (const c of query) h = (h * 31 + c.charCodeAt(0)) & 0xffffffff;

          <div onclick="openEntry('${e.id}')" style="flex-shrink:0;width:38px;height:38px;border-radius:6px;overflow:hidden;cursor:pointer;position:relative;border:1px solid var(--border);">

            <div style="position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,0.55));padding:1px 2px;">
              <div style="font-size:7px;color:#fff;font-weight:700;">${e.rating}/10</div>
            </div>
          </div>`).join('')}
      </div>` : '';

    const qJson = esc(JSON.stringify(item.query));
    return `<div class="shop-list-card shop-swipe-card" data-query="${esc(item.query)}" style="overflow:hidden;">
      <div style="display:flex;align-items:flex-start;gap:10px;padding:12px;">
        ${thumbHTML}
        <div style="flex:1;min-width:0;">
          <div style="font-size:14px;font-weight:700;line-height:1.3;margin-bottom:6px;">${esc(item.query)}</div>
          <div style="display:flex;align-items:center;justify-content:space-between;gap:6px;">
            <span class="priority-badge ${isHigh?'priority-high':'priority-low'}">${badgeLabel}</span>
            <button class="bought-btn" onclick="markPurchased(${qJson})" style="width:auto;padding:5px 12px;font-size:12px;border-radius:var(--r-sm);">✓ Got it</button>
          </div>
        </div>
      </div>
      ${linksHTML}
      ${outfitThumbsHTML}
      <div style="border-top:1px solid var(--border);padding:7px 12px;display:flex;justify-content:flex-end;">
        <button onclick="blockShopItem(${qJson})" style="background:none;border:none;font-size:11px;color:var(--text-3);cursor:pointer;font-family:inherit;padding:2px 0;display:flex;align-items:center;gap:4px;">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          not for me
        </button>
      </div>
    </div>`;
  }

  // Unified list — filter blocked, sort by count descending
  const sortedList = [...list]
    .filter(i => !S.shopBlocked.has(i.query.toLowerCase().trim()))
    .sort((a, b) => b.count - a.count);
  const SHOP_LIMIT = 8;
  const showList = S.shopExpanded ? sortedList : sortedList.slice(0, SHOP_LIMIT);
  const shopMoreCount = sortedList.length - showList.length;
  const shopShowMore = shopMoreCount > 0
    ? `<button class="show-more-btn" onclick="S.shopExpanded=true;render()">Show ${shopMoreCount} more item${shopMoreCount===1?'':'s'} ↓</button>`
    : '';

  const budgetTiers = ['', 'Budget', 'Mid-range', 'Luxury'];
  const budgetIcons = ['', '💚', '🌟', '✨'];
  const budgetDescs = ['', 'Under $50 per piece', '$50–$200 per piece', '$200+ per piece'];

  return `<div class="view">
    <div class="nav">
      <span class="nav-logo">Shopping List</span>
      <button class="nav-add" onclick="navigate('upload')">${iconPlus()} New Outfit</button>
    </div>
    <div class="tab-headline">Intentional additions only.</div>

    <div style="padding:14px 16px 14px;">
      <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-3);margin-bottom:10px;">Price Range</div>
      <div style="display:flex;gap:8px;">
        ${[1,2,3].map(t => {
          const active = S.shopBudget === t;
          return `<button onclick="setShopBudget(${t})" style="flex:1;padding:10px 6px;border-radius:var(--r-sm);border:${active?'2px solid var(--gold)':'1.5px solid var(--border)'};background:${active?'var(--gold-bg)':'var(--surface)'};cursor:pointer;font-family:inherit;transition:all .15s;text-align:center;touch-action:manipulation;">
            <div style="font-size:16px;margin-bottom:2px;">${budgetIcons[t]}</div>
            <div style="font-size:12px;font-weight:${active?'800':'600'};color:${active?'var(--gold-dk)':'var(--text-2)'};">${budgetTiers[t]}</div>
            <div style="font-size:10px;color:${active?'var(--gold-dk)':'var(--text-3)'};margin-top:1px;opacity:.8;">${budgetDescs[t]}</div>
          </button>`;
        }).join('')}
      </div>
      <div style="margin-top:9px;font-size:11px;color:var(--gold-dk);text-align:center;">
        ✓ ${budgetTiers[S.shopBudget]} · ${budgetDescs[S.shopBudget]} filter active
      </div>
    </div>
    <div style="height:1px;background:var(--border);margin:0 16px;"></div>

    ${!hasGoogle ? `<div style="margin:12px 16px 0;">
      <div class="info-box">
        <div class="info-box-icon">🔗</div>
        <div class="info-box-text">Connect Google Custom Search in <strong>Settings</strong> to see real products for each item.</div>
      </div>
    </div>` : ''}

    ${list.length === 0 ? emptyHTML : `
      ${totalOutfitsWithQueries > 0 ? `<p style="font-size:13px;color:var(--text-3);padding:14px 16px 2px;line-height:1.5;">Based on Claude's recommendations across <strong style="color:var(--text);">${totalOutfitsWithQueries} outfit${totalOutfitsWithQueries===1?'':'s'}</strong>. Items worn in more outfits appear first.</p>` : ''}

      <div class="shop-list">${showList.map((item,i)=>shopItemCardHTML(item,i)).join('')}</div>

      ${shopShowMore}
    `}

    <div style="height:8px"></div>
  </div>`;
}

/* ================================================================
   VIEW: PLAN
   ================================================================ */
function viewPlan() {
  const p = S.plan;
  const hasSuggestions = p.suggestions && p.suggestions.length;
  const today = new Date().toISOString().slice(0,10);

  const forecastSection = p.forecast ? `
    <div class="forecast-chip">
      <div class="forecast-icon">${p.forecast.icon}</div>
      <div class="forecast-text">
        ${esc(p.forecast.condition)} · High ${p.forecast.hi}°F / Low ${p.forecast.lo}°F
      </div>
    </div>` : '';

  // Strip leading emoji from item names
  const stripLeadingEmoji = s => s.replace(/^[\u{1F300}-\u{1FAFF}\u{2600}-\u{27BF}\u{FE00}-\u{FEFF}️‍\s]+/gu, '').trim();

  // Find past outfit photos that contain any of the recommended item names
  const findRelatedPhotos = (items) => {
    if (!items?.length) return [];
    const names = items.map(it => stripLeadingEmoji(it).toLowerCase()).filter(Boolean);
    const found = [];
    for (const e of S.entries) {
      if (!e.photo) continue;
      const eNames = (e.items||[]).map(i => (i.name||'').toLowerCase());
      if (names.some(n => eNames.some(en => en.includes(n.slice(0,6)) || n.includes(en.slice(0,6))))) {
        found.push(e);
        if (found.length >= 4) break;
      }
    }
    return found;
  };

  const carouselHTML = hasSuggestions ? `
    <div style="padding:0 20px 10px; display:flex; align-items:baseline; justify-content:space-between;">
      <div style="font-size:13px;font-weight:700;color:var(--text-2);text-transform:uppercase;letter-spacing:.04em;">Claude's Picks</div>
      <div style="font-size:11px;color:var(--text-3);">Swipe to browse</div>
    </div>
    <div class="suggestion-carousel" id="suggCarousel">
      ${p.suggestions.map((s,i) => {
        const entry = s.outfitId ? S.entries.find(e => e.id === s.outfitId) : null;
        const relatedPhotos = findRelatedPhotos(s.items);
        const allPhotos = entry?.photo
          ? [{ photo: entry.photo, id: entry.id }, ...relatedPhotos.filter(e => e.id !== entry.id)]
          : relatedPhotos;
        const photoThumbsHTML = allPhotos.length ? `
          <div class="suggestion-photos-label">Seen in your closet</div>
          <div class="suggestion-photo-refs">
            ${allPhotos.slice(0,4).map(e => `<img class="suggestion-photo-thumb" src="${e.photo}" alt="Past outfit" onclick="openEntry('${e.id}')">`).join('')}
          </div>` : '';
        return `<div class="suggestion-carousel-card">
          ${entry?.photo
            ? `<div style="position:relative;">
                <img class="suggestion-photo" src="${entry.photo}" alt="Outfit ${i+1}">
                <div style="position:absolute;top:12px;left:12px;background:rgba(0,0,0,0.5);backdrop-filter:blur(4px);border-radius:100px;padding:4px 12px;font-size:11px;font-weight:700;color:#fff;">Option ${i+1} of ${p.suggestions.length}</div>
              </div>`
            : `<div style="padding:14px 16px 0;display:flex;align-items:center;justify-content:space-between;">
                <span style="font-size:11px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.04em;">Option ${i+1} of ${p.suggestions.length}</span>
              </div>`}
          <div class="suggestion-body">
            <div class="suggestion-items">
              ${(s.items||[]).map(it=>`<span class="suggestion-item-chip">${esc(stripLeadingEmoji(it))}</span>`).join('')}
            </div>
            <div class="suggestion-reasoning">${esc(s.reasoning||'')}</div>
            ${s.weatherNote ? `<div class="suggestion-weather-note">${esc(s.weatherNote)}</div>` : ''}
            ${photoThumbsHTML}
            ${entry ? `<button class="suggestion-open-btn" onclick="openEntry('${s.outfitId}')">View this outfit →</button>` : ''}
          </div>
        </div>`;
      }).join('')}
    </div>
    <div class="carousel-dots" id="suggDots">
      ${p.suggestions.map((_,i) => `<div class="carousel-dot${i===0?' active':''}" id="sdot-${i}"></div>`).join('')}
    </div>` : '';

  // ── Squad Mode section ────────────────────────────────────
  const squadSectionHTML = (() => {
    const flow = S.squadFlow;

    // Create flow
    if (flow?.step === 'create') {
      const typeGrid = SQUAD_TYPES.map(t => `
        <button class="squad-type-btn ${flow.type===t.id?'active':''}" onclick="S.squadFlow.type='${t.id}';render()">
          <span class="squad-type-icon">${t.icon}</span>
          <span class="squad-type-label">${t.label}</span>
        </button>`).join('');
      const memberInputs = (flow.memberNames||[]).map((n,i) => `
        <div style="display:flex;gap:6px;margin-bottom:6px;">
          <input class="form-input" style="margin:0;flex:1;" placeholder="Name" value="${esc(n)}"
            oninput="S.squadFlow.memberNames[${i}]=this.value">
          <button onclick="removeSquadMemberSlot(${i})" style="background:none;border:1px solid var(--border);border-radius:var(--r-sm);padding:0 10px;cursor:pointer;font-size:14px;color:var(--text-3);">✕</button>
        </div>`).join('');
      return `<div class="plan-card" style="margin-bottom:0;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
          <div class="plan-card-title" style="margin-bottom:0;">New Squad Event</div>
          <button onclick="cancelSquadFlow()" style="background:none;border:none;font-size:13px;color:var(--text-3);cursor:pointer;font-family:inherit;">Cancel</button>
        </div>
        <div class="form-group"><label class="form-label">Event Name</label>
          <input class="form-input" placeholder='e.g. "Cabo June 2026"' value="${esc(flow.name)}" oninput="S.squadFlow.name=this.value"></div>
        <div class="form-group"><label class="form-label">Type</label>
          <div class="squad-type-grid">${typeGrid}</div></div>
        <div class="form-group"><label class="form-label">Dates <span style="font-weight:400;color:var(--text-3);">(optional — each day becomes a slot)</span></label>
          <div style="display:flex;gap:8px;align-items:center;">
            <input class="form-input" type="date" style="margin:0;flex:1;" value="${esc(flow.dateStart||'')}" onchange="S.squadFlow.dateStart=this.value">
            <span style="font-size:12px;color:var(--text-3);flex-shrink:0;">to</span>
            <input class="form-input" type="date" style="margin:0;flex:1;" value="${esc(flow.dateEnd||'')}" onchange="S.squadFlow.dateEnd=this.value">
          </div>
          ${(flow.dateStart && flow.dateEnd && flow.dateStart <= flow.dateEnd) ? `<div style="font-size:11px;color:var(--gold-dk);margin-top:4px;">✦ ${generateSquadDays(flow.dateStart,flow.dateEnd).length} day${generateSquadDays(flow.dateStart,flow.dateEnd).length===1?'':'s'} — each becomes a slot</div>` : ''}
        </div>
        <div class="form-group"><label class="form-label">Vibe / Theme</label>
          <input class="form-input" placeholder='e.g. "White & Gold · Resort Luxe"' value="${esc(flow.vibe)}" oninput="S.squadFlow.vibe=this.value"></div>
        <div class="form-group"><label class="form-label">Dress Code <span style="font-weight:400;color:var(--text-3);">(optional)</span></label>
          <input class="form-input" placeholder='e.g. "All white, no exceptions"' value="${esc(flow.dressCode)}" oninput="S.squadFlow.dressCode=this.value"></div>
        <div class="form-group"><label class="form-label">Your Name</label>
          <input class="form-input" placeholder="Your name" value="${esc(flow.myName)}" oninput="S.squadFlow.myName=this.value"></div>
        <div class="form-group"><label class="form-label">Squad Members</label>
          ${memberInputs}
          <button onclick="addSquadMemberSlot()" style="width:100%;padding:8px;border:1.5px dashed var(--border);border-radius:var(--r-sm);background:none;color:var(--gold);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:2px;">+ Add Member</button>
        </div>
        <button onclick="confirmCreateSquad()" class="btn btn-primary" style="margin:4px 0 0;width:100%;">Create Squad Plan</button>
      </div>`;
    }

    // Join flow
    if (flow?.step === 'join') {
      return `<div class="plan-card" style="margin-bottom:0;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
          <div class="plan-card-title" style="margin-bottom:0;">Join a Squad Plan</div>
          <button onclick="cancelSquadFlow()" style="background:none;border:none;font-size:13px;color:var(--text-3);cursor:pointer;font-family:inherit;">Cancel</button>
        </div>
        <div class="settings-hint" style="margin-bottom:10px;">Paste the squad code someone shared with you:</div>
        <textarea class="plan-textarea" rows="4" placeholder="Paste CLOSET-SQUAD-... code here"
          oninput="S.squadFlow.code=this.value">${esc(flow.code||'')}</textarea>
        <button onclick="confirmJoinSquad()" class="btn btn-primary" style="margin:10px 0 0;width:100%;">Join Squad</button>
      </div>`;
    }

    // Claim slot flow
    if (flow?.step === 'claim') {
      const plan = flow.plan;
      const t = getSquadType(plan.type);
      const slotOptions = plan.members.map(m => `
        <label style="display:flex;align-items:center;gap:10px;padding:10px 12px;border:1.5px solid ${flow.claimId===m.id?'var(--gold)':'var(--border)'};border-radius:var(--r-sm);cursor:pointer;margin-bottom:6px;background:${flow.claimId===m.id?'var(--gold-bg)':'var(--surface)'};" onclick="S.squadFlow.claimId='${m.id}';render()">
          <div class="squad-member-avatar" style="width:32px;height:32px;font-size:13px;">${m.name.slice(0,2).toUpperCase()}</div>
          <div>
            <div style="font-size:13px;font-weight:700;">${esc(m.name)}</div>
            ${m.outfit?`<div style="font-size:11px;color:var(--text-3);">Has a look</div>`:`<div style="font-size:11px;color:var(--text-3);">Empty slot</div>`}
          </div>
        </label>`).join('');
      return `<div class="plan-card" style="margin-bottom:0;">
        <div style="font-size:16px;font-weight:800;margin-bottom:4px;">${t.icon} ${esc(plan.name)}</div>
        <div style="font-size:12px;color:var(--text-3);margin-bottom:14px;">${t.label}${plan.date?' · '+plan.date:''}</div>
        <div class="plan-card-title">Which slot is you?</div>
        ${slotOptions}
        <label style="display:flex;align-items:center;gap:10px;padding:10px 12px;border:1.5px dashed ${flow.claimId==='__new__'?'var(--gold)':'var(--border)'};border-radius:var(--r-sm);cursor:pointer;margin-bottom:12px;background:${flow.claimId==='__new__'?'var(--gold-bg)':'var(--surface)'};" onclick="S.squadFlow.claimId='__new__';render()">
          <div style="width:32px;height:32px;border-radius:50%;background:var(--surface-2);display:flex;align-items:center;justify-content:center;font-size:16px;">+</div>
          <div style="font-size:13px;font-weight:700;">Join as a new member</div>
        </label>
        <div class="form-group"><label class="form-label">Your Name</label>
          <input class="form-input" placeholder="Your name" value="${esc(flow.myName||'')}" oninput="S.squadFlow.myName=this.value"></div>
        <button onclick="confirmClaimSlot()" class="btn btn-primary" style="margin:0;width:100%;">Join Squad 🎉</button>
      </div>`;
    }

    // Default: list of squad plans + create/join buttons
    const planCards = S.squadPlans.map(sp => {
      const st = getSquadType(sp.type);
      const fmtD = (() => {
        if (sp.dateStart && sp.dateEnd && sp.dateStart !== sp.dateEnd) {
          const s = new Date(sp.dateStart+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});
          const e = new Date(sp.dateEnd+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});
          return `${s} – ${e}`;
        } else if (sp.dateStart) {
          return new Date(sp.dateStart+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});
        } else if (sp.date) {
          return new Date(sp.date+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});
        }
        return '';
      })();
      const filled = sp.members.filter(m=>m.outfit).length;
      return `<div class="squad-event-card" onclick="openSquadDetail('${sp.id}')">
        <div class="squad-event-header">
          <div class="squad-event-icon">${st.icon}</div>
          <div style="flex:1;min-width:0;">
            <div class="squad-event-name">${esc(sp.name)}</div>
            <div class="squad-event-meta">${st.label}${fmtD?' · '+fmtD:''} · ${sp.members.length} members · ${filled} look${filled===1?'':'s'} added</div>
            ${sp.vibe?`<div style="font-size:11px;color:var(--gold-dk);margin-top:2px;font-weight:600;">✦ ${esc(sp.vibe)}</div>`:''}
          </div>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text-3)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
        </div>
      </div>`;
    }).join('');

    return `<div style="margin-bottom:4px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
        <div style="font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--text-3);">👯 Squad Mode</div>
        <div style="display:flex;gap:6px;">
          <button onclick="startJoinSquad()" style="padding:6px 12px;border-radius:100px;border:1.5px solid var(--border);background:var(--surface);font-size:12px;font-weight:600;color:var(--text-2);cursor:pointer;font-family:inherit;">Join</button>
          <button onclick="startCreateSquad()" style="padding:6px 12px;border-radius:100px;border:none;background:var(--gold);color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;">+ Create</button>
        </div>
      </div>
      ${planCards || `<div style="font-size:13px;color:var(--text-3);font-style:italic;padding:4px 0 8px;">Plan a trip, party, or event with your crew — coordinating looks has never been this fun.</div>`}
    </div>`;
  })();

  const planMode = S.planMode || 'solo';

  return `<div class="view">
    <div class="nav">
      <span class="nav-logo">Plan</span>
      <span></span>
    </div>

    <div class="plan-hero">
      <div class="plan-hero-title">What's the occasion?</div>
      <div class="plan-hero-sub">Plan what's next — solo or with your crew.</div>
    </div>

    <!-- Mode toggle -->
    <div style="display:flex;gap:8px;padding:0 16px 16px;">
      <button onclick="S.planMode='solo';render()" style="flex:1;padding:10px 0;border-radius:var(--r-sm);border:2px solid ${planMode==='solo'?'var(--gold)':'var(--border)'};background:${planMode==='solo'?'var(--gold-bg)':'var(--surface)'};color:${planMode==='solo'?'var(--gold-dk)':'var(--text-2)'};font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;">
        🪞 Solo Fit
      </button>
      <button onclick="S.planMode='group';render()" style="flex:1;padding:10px 0;border-radius:var(--r-sm);border:2px solid ${planMode==='group'?'var(--gold)':'var(--border)'};background:${planMode==='group'?'var(--gold-bg)':'var(--surface)'};color:${planMode==='group'?'var(--gold-dk)':'var(--text-2)'};font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;">
        👯 Group Fit
      </button>
    </div>

    ${planMode === 'group' ? `
      <div style="padding:0 16px 16px;">${squadSectionHTML}</div>
    ` : `
      <div class="plan-card">
        <div class="plan-card-title">Describe your event</div>
        <textarea class="plan-textarea" id="planEventDesc" rows="3"
          placeholder="e.g. rooftop birthday dinner next Saturday, or job interview at a creative agency…"
          oninput="S.plan.eventDesc=this.value">${esc(p.eventDesc)}</textarea>
      </div>

      <div class="plan-card">
        <div class="plan-card-title">Weather forecast (optional)</div>
        <div class="plan-date-row">
          <input class="plan-date-input" type="date" id="planDate" value="${p.date || today}"
            min="${today}" oninput="S.plan.date=this.value">
          <button class="btn btn-secondary" style="margin:0;padding:10px 16px;font-size:13px;white-space:nowrap;"
            onclick="doGetForecast()" ${p.loadingForecast?'disabled':''}>
            ${p.loadingForecast ? '…' : '📍 Get Forecast'}
          </button>
        </div>
        ${forecastSection}
        <div style="font-size:12px;color:var(--text-3);margin-top:8px;">Requires location permission · Uses Open-Meteo (free)</div>
      </div>

      <div style="padding:0 20px 20px;">
        <button class="btn btn-primary" onclick="doSuggestOutfits()" style="margin:0;"
          ${p.loadingSuggest||!p.eventDesc.trim()?'disabled opacity:.55':''}>
          ${p.loadingSuggest ? '✨ Claude is thinking…' : '✨ Suggest Outfits'}
        </button>
      </div>

      ${carouselHTML}

      ${S.entries.length === 0 && S.wardrobe.length === 0 ? `
        <div class="empty" style="padding-top:20px;">
          <div class="empty-icon">👗</div>
          <h2>Add outfits first</h2>
          <p>Log a few outfits to your Closet and Claude will have something to work with!</p>
        </div>` : ''}
    `}

    <div style="height:30px"></div>
  </div>`;
}

async function doGetForecast() {
  const dateStr = S.plan.date || new Date().toISOString().slice(0,10);
  S.plan.loadingForecast = true; S.plan.forecast = null; render();
  try {
    const result = await fetchForecastWeather(dateStr);
    S.plan.forecast = result;
    if (!result) toast('📍 Could not fetch forecast — check location permission');
  } catch { toast('📍 Location access needed for forecast'); }
  S.plan.loadingForecast = false; render();
}

async function doSuggestOutfits() {
  if (!S.plan.eventDesc.trim()) return;
  if (!S.apiKey.trim()) { navigate('settings'); toast('Add your API key first!'); return; }
  S.plan.loadingSuggest = true; S.plan.suggestions = null; render();

/* ================================================================
   CYCLE TRACKING HELPER
   ================================================================ */
function cyclePhaseForDate(date) {
  if (!S.cycleEnabled || !S.cycleStartDay) return null;
  const cycleLen  = S.cycleLength     || 28;
  const periodLen = S.cyclePeriodDays || 5;
  const startDay  = parseInt(S.cycleStartDay);
  const d = new Date(date); d.setHours(12, 0, 0, 0);

  // Find the most recent cycle start on or before d
  let lastStart = new Date(d.getFullYear(), d.getMonth(), startDay);
  if (lastStart > d) lastStart = new Date(d.getFullYear(), d.getMonth() - 1, startDay);

  const daysElapsed = Math.floor((d - lastStart) / 86400000);
  const dayOfCycle  = (daysElapsed % cycleLen) + 1;

  if (dayOfCycle <= periodLen) return 'period';
  if (dayOfCycle <= 13)        return 'follicular';
  if (dayOfCycle <= 16)        return 'ovulation';
  return 'luteal';
}

const CYCLE_PHASES = {
  period:      { label: 'Period',      cls: 'cp-period',     sw: 'csw-period',     tip: 'Comfort first — soft fabrics, stretchy waistbands, earthy tones.' },
  follicular:  { label: 'Follicular',  cls: 'cp-follicular', sw: 'csw-follicular', tip: 'Energy rising — great time to try new styles and brighter colors.' },
  ovulation:   { label: 'Ovulation',   cls: 'cp-ovulation',  sw: 'csw-ovulation',  tip: 'Peak confidence — dress boldly, fitted silhouettes, stand-out pieces.' },
  luteal:      { label: 'Luteal',      cls: 'cp-luteal',     sw: 'csw-luteal',     tip: 'Cozy & comfortable — flowy fits, neutral palettes, ease over structure.' },
};

    ${auraFieldHTML('profileHeight',     'closet-profile-height',  '📏', 'Height',         'e.g. 5\'7", 170cm…',             S.profileHeight)}
    ${auraFieldHTML('braSize',           'closet-bra-size',        '🩱', 'Bra Size',       'e.g. 32C, 34B…',                 S.braSize)}
    ${auraFieldHTML('profileWeight',     'closet-profile-weight',  '⚖️', 'Weight',         'e.g. 130 lbs, 58kg…',            S.profileWeight)}
    ${auraFieldHTML('signatureNailColor','closet-nail-color',      '💅', 'Signature Nail', 'e.g. Bordeaux, OPI Bubble Bath…', S.signatureNailColor)}
  </div>`;

  function profileSection(title, content) {

  }

  return `<div class="view">
